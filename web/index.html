    // would push the parser into quirks mode. DOMParser always emits a <head>

inity;\n  if(prevBestSeconds !== Infinity && bs < prevBestSeconds - 0.0005){\n    flashBest();\n  }\n  prevBestSeconds = bs;\n\n  renderStatus(s);\n  // session static parts only re-render when changed (preserves animations)\n  const sh = JSON.stringify([s.current_car, s.session_best, s.last_laps, s.cars_used]);\n  if(sh !== lastStaticHash){ renderSessionStatic(s); lastStaticHash = sh; }\n\n  const oh = JSON.stringify(s.overall);\n  if(oh !== lastOverallHash){ renderOverall(s); lastOverallHash = oh; }\n\n  const ch = JSON.stringify(s.by_car);\n  if(ch !== lastCarsHash){ renderCars(s); lastCarsHash = ch; }\n\n  soundPoll(s);\n}\n\nfunction renderStatus(s){\n  const el = $(\"status\");\n  const txt = el.querySelector(\".stxt\");\n  if(s.connected){\n    el.className = \"status on\";\n    txt.textContent = s.in_world ? t('status_ingame') : t('status_menu');\n  } else {\n    el.className = \"status off\";\n    txt.textContent = t('status_disconnected');\n  }\n}\n\nfunction renderSessionStatic(s){\n  const car = s.current_car || {};\n  const nm = car.name || \"—\";\n  const ym = /^(\\d{4})\\s+(.*)$/.exec(nm);\n  $(\"s-carname\").innerHTML = ym ? `<span class=\"cy\">${esc(ym[1])}<\u002Fspan>${esc(ym[2])}` : esc(nm);\n  currentCarSlug = carSlug(ym ? ym[2] : nm);\n  paintCarImage($(\"s-carimg\"), currentCarSlug, car.image);\n\n  const pc = clsColor(car.class);\n  $(\"s-meta\").innerHTML =\n    `<span class=\"seg\"><span class=\"classpill\" style=\"color:${pc};border-color:${pc}\">${esc(car.class||\"–\")}<\u002Fspan><\u002Fspan>`+\n    `<span class=\"sep\">·<\u002Fspan>`+\n    `<span class=\"seg\"><span class=\"pibadge\" style=\"background:${pc}\">${esc(car.pi!=null?car.pi:\"–\")}<\u002Fspan><span style=\"color:var(--txt3);font-size:13px;letter-spacing:1px\">PI<\u002Fspan><\u002Fspan>`+\n    `<span class=\"sep\">·<\u002Fspan>`+\n    `<span class=\"seg\">${esc(car.drivetrain||\"–\")}<\u002Fspan>`;\n\n  // best card\n  const sb = s.session_best || {};\n  $(\"s-besttime\").textContent = sb.time || \"—\";\n  $(\"s-bestsub\").innerHTML = sb.car_name\n    ? `<span><b>${carNameHTML(sb.car_name,'cyf')}<\u002Fb><\u002Fspan><span>${esc(sb.track||\"\")}<\u002Fspan>`\n    : `<span>${esc(t('best_none'))}<\u002Fspan>`;\n\n  // last laps\n  const ll = s.last_laps || [];\n  const topKey = ll.length ? (ll[0].time+\"|\"+ll[0].car_name+\"|\"+ll[0].track) : null;\n  const isNewTop = prevTopLapKey !== null && topKey !== null && topKey !== prevTopLapKey;\n  $(\"s-laplist\").innerHTML = ll.length ? ll.map((l,i)=>{\n    const pc = clsColor(l.class);\n    const slide = (i===0 && isNewTop) ? \" slidein\" : \"\";\n    return `<div class=\"laprow${slide}\">`+\n      `<div class=\"lt mono\">${esc(l.time)}<\u002Fdiv>`+\n      `<div class=\"lc\"><b>${carNameHTML(l.car_name,'cyf')}<\u002Fb>${esc(l.track||\"\")}<\u002Fdiv>`+\n      `<span class=\"cls-sm\" style=\"color:${pc};border-color:${pc}\">${esc(l.class||\"–\")}<\u002Fspan>`+\n    `<\u002Fdiv>`;\n  }).join(\"\") : `<div class=\"empty\">${esc(t('laps_none'))}<\u002Fdiv>`;\n  prevTopLapKey = topKey;\n\n  // cars used\n  const cu = s.cars_used || [];\n  $(\"s-carsused\").innerHTML = cu.length ? cu.map(c=>{\n    const pc = clsColor(c.class);\n    return `<div class=\"curow\">`+\n      `<div class=\"ct-img\" data-slug=\"${esc(carSlug(c.car_name))}\" data-img=\"${esc(c.image||'')}\"><\u002Fdiv>`+\n      `<div class=\"cn\">${carNameHTML(c.car_name,'cyf')}<\u002Fdiv>`+\n      `<div class=\"cmeta\">`+\n        `<span class=\"cls-sm\" style=\"color:${pc};border-color:${pc}\">${esc(c.class||\"–\")}<\u002Fspan>`+\n        `<span class=\"pi-sm\" style=\"background:${pc}\">${esc(c.pi!=null?c.pi:\"–\")}<\u002Fspan>`+\n      `<\u002Fdiv>`+\n      `<div class=\"laps\">${esc(c.lap_count!=null?c.lap_count:\"–\")} ${esc(t('laps_abbr'))}<\u002Fdiv>`+\n      `<div class=\"cb mono\">${esc(c.best||\"—\")}<\u002Fdiv>`+\n    `<\u002Fdiv>`;\n  }).join(\"\") : `<div class=\"empty\">${esc(t('cars_none'))}<\u002Fdiv>`;\n  $(\"s-carsused\").querySelectorAll(\".ct-img\").forEach(el=>{ paintCarImage(el, el.dataset.slug, el.dataset.img||null); wireDrop(el, ()=>el.dataset.slug); });\n}\n\nfunction renderOverall(s){\n  const rows = s.overall || [];\n  const groups = {};\n  const order = [];\n  rows.forEach(r=>{ if(!groups[r.track]){ groups[r.track]=[]; order.push(r.track); } groups[r.track].push(r); });\n\n  const html = order.map(track=>{\n    const list = groups[track].slice().sort((a,b)=>(a.rank||999)-(b.rank||999));\n    const body = list.map(r=>{\n      const pc = clsColor(r.class);\n      const top = r.rank===1 ? \" top1\" : \"\";\n      return `<tr class=\"${top.trim()}\">`+\n        `<td class=\"rk\">${esc(r.rank)}<\u002Ftd>`+\n        `<td class=\"carcell\">${carNameHTML(r.car_name,'cyf')}<\u002Ftd>`+\n        `<td class=\"cell-cls\"><span class=\"cls-sm\" style=\"color:${pc};border-color:${pc}\">${esc(r.class||\"–\")}<\u002Fspan><\u002Ftd>`+\n        `<td class=\"cell-pi\"><span class=\"pi-sm\" style=\"background:${pc}\">${esc(r.pi!=null?r.pi:\"–\")}<\u002Fspan><\u002Ftd>`+\n        `<td class=\"cell-time\">${esc(r.time)}<\u002Ftd>`+\n      `<\u002Ftr>`;\n    }).join(\"\");\n    return `<div class=\"grouphd\"><span class=\"tn\">${esc(track)}<\u002Fspan><span class=\"ln\"><\u002Fspan><span class=\"ct\">${esc(tp('entries',{n:list.length}))}<\u002Fspan><\u002Fdiv>`+\n      `<div class=\"panel\" style=\"overflow:hidden\"><table class=\"ot\"><thead><tr>`+\n      `<th style=\"width:54px\">${esc(t('th_rank'))}<\u002Fth><th>${esc(t('th_car'))}<\u002Fth><th style=\"width:70px\">${esc(t('th_class'))}<\u002Fth><th style=\"width:80px\">${esc(t('th_pi'))}<\u002Fth><th style=\"text-align:right\">${esc(t('th_time'))}<\u002Fth>`+\n      `<\u002Ftr><\u002Fthead><tbody>${body}<\u002Ftbody><\u002Ftable><\u002Fdiv>`;\n  }).join(\"\");\n  $(\"o-groups\").innerHTML = html || `<div class=\"empty\">${esc(t('overall_none'))}<\u002Fdiv>`;\n}\n\nfunction renderCars(s){\n  const cars = s.by_car || [];\n  const openSet = new Set([...document.querySelectorAll(\"details.veh[open]\")].map(d=>d.dataset.veh));\n  const html = cars.map((c,ci)=>{\n    const pc = clsColor(c.class);\n    const laps = (c.laps||[]).slice().sort((a,b)=>parseTime(a.time)-parseTime(b.time));\n    const key = c.name+\"|\"+ci;\n    const cslug = carSlug(c.name);\n    const open = openSet.has(key) || (openSet.size===0 && ci===0);\n    const body = laps.map((l,i)=>{\n      const tele = !!(l.has_telemetry && l.lap_id);\n      const attrs = tele\n        ? ` data-lapid=\"${esc(l.lap_id)}\" data-laptime=\"${esc(l.time)}\" data-laptrack=\"${esc(l.track)}\" data-lapcar=\"${esc(c.name)}\" tabindex=\"0\" role=\"button\" aria-label=\"${esc(tp('analyze_aria',{track:l.track,time:l.time}))}\"`\n        : \"\";\n      return `<tr class=\"${i===0?'fastest':''}${tele?' lt-click':''}\"${attrs}>`+\n        `<td class=\"lt-track\">${esc(l.track)}<\u002Ftd>`+\n        `<td class=\"lt-time\">${esc(l.time)}<\u002Ftd>`+\n        `<td class=\"lt-date\">${esc(fmtStamp(l.timestamp))}<\u002Ftd>`+\n        `<td class=\"lt-go\">${tele?('<span class=\"go\">'+esc(t('analyze'))+'&nbsp;&rsaquo;<\u002Fspan>'):''}<\u002Ftd>`+\n        `<td class=\"lt-del-cell\"><button class=\"lt-del\" data-lapid=\"${esc(l.lap_id||'')}\" title=\"${esc(t('del_lap'))}\" aria-label=\"${esc(t('del_lap'))}\">${TRASH_SVG}<\u002Fbutton><\u002Ftd>`+\n      `<\u002Ftr>`;\n    }).join(\"\");\n    return `<details class=\"veh\" data-veh=\"${esc(key)}\"${open?\" open\":\"\"}>`+\n      `<summary>`+\n        `<span class=\"chev\"><\u002Fspan>`+\n        `<span class=\"vimg\" data-slug=\"${esc(cslug)}\" data-img=\"${esc(c.image||'')}\" title=\"${esc(t('img_title_short'))}\"><\u002Fspan>`+\n        `<span class=\"vname\"><span class=\"vn\">${carNameHTML(c.name,'cyf')}<\u002Fspan><span class=\"vsub\"><span class=\"cls-sm\" style=\"color:${pc};border-color:${pc}\">${esc(c.class||\"–\")}<\u002Fspan> · PI ${esc(c.pi!=null?c.pi:\"–\")}${c.ordinal?(' · #'+esc(c.ordinal)):''}<\u002Fspan><\u002Fspan>`+\n        `<span class=\"vstat\">`+\n          `<span class=\"vs\"><span class=\"k\">${esc(t('veh_laps'))}<\u002Fspan><span class=\"v\">${esc(c.lap_count!=null?c.lap_count:laps.length)}<\u002Fspan><\u002Fspan>`+\n          `<span class=\"vs\"><span class=\"k\">${esc(t('veh_best'))}<\u002Fspan><span class=\"v best mono\">${esc(c.best||\"—\")}<\u002Fspan><\u002Fspan>`+\n        `<\u002Fspan>`+\n      `<\u002Fsummary>`+\n      `<div class=\"vehbody\"><table class=\"lt\"><thead><tr>`+\n        `<th>${esc(t('th_track'))}<\u002Fth><th style=\"text-align:right\">${esc(t('th_time'))}<\u002Fth><th style=\"text-align:right\">${esc(t('th_date'))}<\u002Fth><th style=\"width:96px\"><\u002Fth><th style=\"width:48px\"><\u002Fth>`+\n      `<\u002Ftr><\u002Fthead><tbody>${body}<\u002Ftbody><\u002Ftable><\u002Fdiv>`+\n    `<\u002Fdetails>`;\n  }).join(\"\");\n  $(\"v-list\").innerHTML = html || `<div class=\"empty\">${esc(t('cars_none_data'))}<\u002Fdiv>`;\n  $(\"v-list\").querySelectorAll(\".vimg\").forEach(el=>{\n    paintCarImage(el, el.dataset.slug, el.dataset.img||null);\n    wireDrop(el, ()=>el.dataset.slug);\n  });\n}\n\n/* ---- clock + delta (smooth tick via rAF) ---- */\nconst DELTA_CAP = 3.0; // seconds mapped to full half-bar\nfunction liveLapSeconds(){\n  if(!state || !state.in_world) return null;\n  const base = state.current_lap_seconds || 0;\n  return base + (performance.now() - state._t)/1000;\n}\nfunction fmtDeltaLive(str){\n  if(str==null) return \"—\";\n  let s = String(str).trim();\n  if(lang===\"de\") s = s.replace(/\\./g, \",\");   // deutsches Dezimalkomma\n  return s + \" s\";\n}\nfunction tickClock(){\n  const clk = $(\"s-clock\"), dv = $(\"s-delta\"), fill = $(\"s-deltafill\");\n  const row = $(\"s-deltarow\"), lbl = $(\"s-clocklabel\");\n\n  // Uhr läuft nur, wenn current_lap gesetzt ist\n  const counting = !!state && state.current_lap != null;\n\n  if(!counting){\n    clk.classList.remove(\"flash\");\n    row.style.display = \"none\";\n    lbl.style.visibility = \"hidden\";\n    if(state && state.in_world && state.current_track){\n      clk.classList.remove(\"idle\",\"mono\"); clk.classList.add(\"msg\");\n      clk.textContent = t('lap_hint_start');\n    } else if(state && !state.in_world){\n      clk.classList.remove(\"idle\",\"mono\"); clk.classList.add(\"msg\");\n      clk.textContent = t('status_menu');\n    } else {\n      clk.classList.remove(\"msg\"); clk.classList.add(\"idle\",\"mono\");\n      clk.textContent = \"0:00.000\";\n    }\n    requestAnimationFrame(tickClock); return;\n  }\n\n  // Uhr läuft\n  row.style.display = \"\";\n  lbl.style.visibility = \"\";\n  clk.classList.remove(\"idle\",\"msg\"); clk.classList.add(\"mono\");\n  const live = (state.current_lap_seconds || 0) + (performance.now() - state._t)/1000;\n  clk.textContent = fmtTime(live);\n\n  // Live-Delta direkt aus state.current_delta\n  const cds = state.current_delta_seconds;\n  if(state.current_delta == null || cds == null){\n    dv.className = \"deltaval neutral mono\"; dv.textContent = \"—\";\n    fill.className = \"fill\"; fill.style.width = \"0\";\n  } else {\n    const faster = cds < 0;\n    dv.className = \"deltaval mono \" + (Math.abs(cds)<0.0005 ? \"neutral\" : (faster?\"faster\":\"slower\"));\n    dv.textContent = fmtDeltaLive(state.current_delta);\n    const p = Math.min(Math.abs(cds)/DELTA_CAP, 1), half = p*50;\n    if(faster){ fill.className=\"fill faster\"; fill.style.left=(50-half)+\"%\"; fill.style.width=half+\"%\"; }\n    else { fill.className=\"fill slower\"; fill.style.left=\"50%\"; fill.style.width=half+\"%\"; }\n  }\n  requestAnimationFrame(tickClock);\n}\n\nfunction flashBest(){\n  const clk = $(\"s-clock\"); const bc = $(\"s-bestcard\");\n  clk.classList.remove(\"flash\"); bc.classList.remove(\"flash\");\n  void clk.offsetWidth; void bc.offsetWidth;\n  clk.classList.add(\"flash\"); bc.classList.add(\"flash\");\n}\n\n/* ============================================================\n   Sample simulator (only when backend is unavailable)\n   ============================================================ */\nlet sim = null;\nlet simLapStart = 0;\nlet simLapTarget = 0;\nlet scriptedDone = false;\nconst SIM_TRACKS = [\"Coastal Sprint\",\"Desert Mile\",\"Highland Loop\",\"City Circuit\"];\nconst SIM_TARGETS = { \"Coastal Sprint\":102.3, \"Desert Mile\":58.2, \"Highland Loop\":125.4, \"City Circuit\":91.6 };\nlet simTrackIdx = 0;\nlet simIdleUntil = 0;\n\nfunction initSim(){\n  sim = JSON.parse(JSON.stringify(SAMPLE));\n  simLapStart = performance.now();\n  simIdleUntil = 0;\n  simTrackIdx = 0;\n  simLapTarget = SIM_TARGETS[SIM_TRACKS[simTrackIdx]] + (Math.random()*2-0.5);\n  // scripted new-best demo a few seconds after load (showcases blink + slide-in)\n  setTimeout(()=>{\n    if(scriptedDone || !sim) return;\n    scriptedDone = true;\n    const t = 102.090, ts = \"Coastal Sprint\";\n    const lap = { time: fmtTime(t), time_seconds: t, car_name: sim.current_car.name, class: sim.current_car.class, pi: sim.current_car.pi, track: ts };\n    sim.last_laps.unshift(lap); sim.last_laps = sim.last_laps.slice(0,7);\n    sim.session_best = { time: fmtTime(t), time_seconds: t, car_name: sim.current_car.name, track: ts };\n    const cu = sim.cars_used.find(c=>c.car_name===sim.current_car.name);\n    if(cu) cu.lap_count += 1;\n  }, 6500);\n}\nfunction simFinishLap(){\n  const track = SIM_TRACKS[simTrackIdx % SIM_TRACKS.length];\n  const tsec = simLapTarget;\n  const isRec = tsec < sim.session_best.time_seconds;\n  const lap = { time: fmtTime(tsec), time_seconds: tsec, car_name: sim.current_car.name, class: sim.current_car.class, pi: sim.current_car.pi, track, is_record: isRec };\n  sim.last_laps.unshift(lap); sim.last_laps = sim.last_laps.slice(0,7);\n  if(isRec){ sim.session_best = { time: fmtTime(tsec), time_seconds: tsec, car_name: sim.current_car.name, track }; }\n  const cu = sim.cars_used.find(c=>c.car_name===sim.current_car.name);\n  if(cu) cu.lap_count += 1;\n  simTrackIdx++;\n  simIdleUntil = performance.now() + 2600;   // kurze Pause zwischen den Runden (zeigt den Start/Ziel-Hinweis)\n  simLapStart = simIdleUntil;\n  simLapTarget = SIM_TARGETS[SIM_TRACKS[simTrackIdx % SIM_TRACKS.length]] + (Math.random()*2-0.5);\n}\nfunction simTelemetry(){\n  const t = performance.now()/1000;\n  const corner    = Math.sin(t*0.62);                       // -1..1\n  const braking   = Math.max(0, -Math.sin(t*0.5 + 0.4));    // 0..1 bursts\n  const onThrottle= Math.max(0, Math.sin(t*0.5 + 0.9));     // 0..1\n  const speed = 86 + 132*(0.5+0.5*Math.sin(t*0.45));        // ~86..218\n  const rpmMax = 8500;\n  const gear = Math.max(1, Math.min(6, Math.round(speed/36)));\n  const rpm = Math.round(2600 + (rpmMax-3200)*(0.35+0.55*Math.abs(Math.sin(t*1.35))));\n  const throttle = Math.round(100*onThrottle*(braking>0.15?0.05:1));\n  const brake = Math.round(100*braking);\n  const steer = Math.round(corner*72);\n  const lat  = +(corner*1.3).toFixed(2);\n  const long = +(onThrottle*0.85 - braking*2.1).toFixed(2);\n  const load = Math.abs(corner);\n  const baseF = 84, baseR = 89;\n  const tt = (base,extra)=> Math.round(base + extra);\n  const slip = (base,k)=> +(base + k*(load*0.45 + onThrottle*0.5)).toFixed(2);\n  return {\n    speed_kmh:+speed.toFixed(1), rpm, rpm_max:rpmMax, gear,\n    throttle, brake, steer,\n    accel_lat_g:lat, accel_long_g:long,\n    power_kw:+(120 + 210*(rpm/rpmMax)).toFixed(0), torque_nm:Math.round(360 + 120*onThrottle),\n    boost:+(0.3 + 0.9*onThrottle).toFixed(2), fuel:+(0.74 - (t%600)/4000).toFixed(2),\n    tire_temp:{ fl:tt(baseF, load*6+corner*3), fr:tt(baseF, load*6-corner*3), rl:tt(baseR, load*7+onThrottle*4+corner*2), rr:tt(baseR, load*7+onThrottle*4-corner*2) },\n    tire_slip:{ fl:slip(0.08,0.6), fr:slip(0.08,0.6), rl:slip(0.18,1.05), rr:slip(0.18,1.05) },\n    susp_travel:{ fl:+(0.4+corner*0.15).toFixed(2), fr:+(0.4-corner*0.15).toFixed(2), rl:+(0.5+long*0.05).toFixed(2), rr:+(0.5+long*0.05).toFixed(2) }\n  };\n}\nfunction simulateSample(){\n  if(!sim) initSim();\n  const now = performance.now();\n  sim.in_world = true;\n  sim.current_track = SIM_TRACKS[simTrackIdx % SIM_TRACKS.length];\n  sim.telemetry = simTelemetry();\n  if(now < simIdleUntil){\n    // zwischen den Runden – Uhr läuft nicht\n    sim.current_lap = null; sim.current_lap_seconds = 0;\n    sim.current_delta = null; sim.current_delta_seconds = null;\n    return sim;\n  }\n  const cur = (now - simLapStart)/1000;\n  if(cur >= simLapTarget){\n    simFinishLap();\n    sim.current_lap = null; sim.current_lap_seconds = 0;\n    sim.current_delta = null; sim.current_delta_seconds = null;\n    return sim;\n  }\n  const live = (now - simLapStart)/1000;\n  sim.current_lap_seconds = live;\n  sim.current_lap = fmtTime(live);\n  // Live-Delta ggü. Referenz-Bestzeit der Strecke\n  const ref = SIM_TARGETS[sim.current_track] || simLapTarget;\n  const proj = simLapTarget - ref;\n  const frac = Math.min(1, live/simLapTarget);\n  const cds = +(proj*frac + Math.sin(now/700)*0.25*(1-frac)).toFixed(3);\n  sim.current_delta_seconds = cds;\n  sim.current_delta = (cds<0?\"-\":\"+\") + Math.abs(cds).toFixed(3);\n  return sim;\n}\n\n/* ============================================================\n   Polling\n   ============================================================ */\nasync function loadState(){\n  try{\n    const res = await fetch(\"/api/state\", { cache:\"no-store\" });\n    if(!res.ok) throw new Error(\"bad status \"+res.status);\n    const data = await res.json();\n    sim = null; scriptedDone = false; // drop sim once a real backend answers\n    applyState(data);\n  }catch(e){\n    applyState(simulateSample());\n  }\n}\n\n/* ============================================================\n   UI wiring\n   ============================================================ */\ndocument.querySelectorAll(\"nav.tabs button\").forEach(btn=>{\n  btn.addEventListener(\"click\",()=>{\n    document.querySelectorAll(\"nav.tabs button\").forEach(b=>b.classList.toggle(\"active\",b===btn));\n    const t = btn.dataset.tab;\n    $(\"tab-session\").classList.toggle(\"hidden\", t!==\"session\");\n    $(\"tab-overall\").classList.toggle(\"hidden\", t!==\"overall\");\n    $(\"tab-cars\").classList.toggle(\"hidden\", t!==\"cars\");\n    $(\"tab-compare\").classList.toggle(\"hidden\", t!==\"compare\");\n    $(\"tab-settings\").classList.toggle(\"hidden\", t!==\"settings\");\n    if(t===\"compare\") buildCompare();\n  });\n});\n/* ============================================================\n   Darstellung: Theme (Technical/Digital/Sporty/Daylight) + Akzentfarbe\n   Layout identisch — Theme ändert nur Farben (+ Ziffern-Font).\n   ============================================================ */\nconst UITHEMES = {\n  dark:  { light:false },\n  light: { light:true  }\n};\nconst ACCENTS = {\n  green:{ dark:{a:\"#2bd96b\",g:\"rgba(43,217,107,.7)\", s:\"rgba(43,217,107,.10)\", ink:\"#05140a\"},\n          light:{a:\"#12a06a\",g:\"rgba(18,160,106,.34)\",s:\"rgba(18,160,106,.12)\", ink:\"#ffffff\"} },\n  amber:{ dark:{a:\"#f5a623\",g:\"rgba(245,166,35,.62)\",s:\"rgba(245,166,35,.12)\", ink:\"#1a1205\"},\n          light:{a:\"#bf7a0e\",g:\"rgba(191,122,14,.32)\",s:\"rgba(191,122,14,.12)\", ink:\"#ffffff\"} },\n  blue:{  dark:{a:\"#3d9bff\",g:\"rgba(61,155,255,.62)\",s:\"rgba(61,155,255,.12)\", ink:\"#04101f\"},\n          light:{a:\"#1f6fd6\",g:\"rgba(31,111,214,.32)\",s:\"rgba(31,111,214,.12)\", ink:\"#ffffff\"} }\n};\nlet uiTheme=\"dark\";\ntry{ const v=localStorage.getItem(\"fh6_uitheme\");\n  if(v===\"dark\"||v===\"light\") uiTheme=v;\n  else if(v===\"daylight\") uiTheme=\"light\";\n  else if(v) uiTheme=\"dark\";   // technical/digital/sporty -> dark\n}catch(e){}\nlet accent=\"green\";\ntry{ const tv=localStorage.getItem(\"fh6_theme\"); if(tv&&ACCENTS[tv]) accent=tv; }catch(e){}\n\nfunction applyAppearance(){\n  const th=UITHEMES[uiTheme]||UITHEMES.dark;\n  const r=document.documentElement;\n  r.setAttribute(\"data-theme\", uiTheme);\n  const ac=(   `<text x=\"${padL-6}\" y=\"${(y+3.4).toFixed(1)}\" text-anchor=\"end\" font-size=\"10\" fill=\"${AXIS}\" font-family=\"ui-monospace,'Cascadia Mono','Segoe UI Mono',Consolas,monospace\">${o.yfmt?o.yfmt(t):t}<\u002Ftext>`; });\n  if(o.threshold!=null){ const y=Y(o.threshold);\n    s+=`<line x1=\"${padL}\" y1=\"${y.toFixed(1)}\" x2=\"${padL+plotW}\" y2=\"${y.toFixed(1)}\" stroke=\"rgba(255,82,71,.9)\" stroke-width=\"1\" stroke-dasharray=\"4 3\"/>`+\n       `<text x=\"${padL+plotW}\" y=\"${(y-4).toFixed(1)}\" text-anchor=\"end\" font-size=\"9.5\" fill=\"#ff5247\" font-family=\"ui-monospace,'Cascadia Mono','Segoe UI Mono',Consolas,monospace\">${esc(o.thresholdLabel||'Grip-Limit 1.0')}<\u002Ftext>`; }\n  for(let k=0;k<=4;k++){ const dv=d0+(d1-d0)*k/4, x=X(dv);\n    s+=`<text x=\"${x.toFixed(1)}\" y=\"${H-6}\" text-anchor=\"${k===0?'start':(k===4?'end':'middle')}\" font-size=\"10\" fill=\"${AXIS}\" font-family=\"ui-monospace,'Cascadia Mono','Segoe UI Mono',Consolas,monospace\">${Math.round(dv)}${k===4?' m':''}<\u002Ftext>`; }\n  s+=`<line x1=\"${padL}\" y1=\"${(padT+plotH).toFixed(1)}\" x2=\"${padL+plotW}\" y2=\"${(padT+plotH).toFixed(1)}\" stroke=\"${AXISLINE}\" stroke-width=\"1\"/>`;\n  (o.series||[]).forEach(ser=>{\n    let p='';\n    for(let i=0;i<ser.values.length;i++){ p+=(i?'L':'M')+X(d[i]).toFixed(1)+' '+Y(ser.values[i]).toFixed(1)+' '; }\n    s+=`<path d=\"${p}\" fill=\"none\" stroke=\"${ser.color}\" stroke-width=\"${ser.width||1.8}\" stroke-linejoin=\"round\" stroke-linecap=\"round\"${ser.dash?` stroke-dasharray=\"${ser.dash}\"`:''}${ser.opacity!=null?` opacity=\"${ser.opacity}\"`:''}/>`;\n    if(o.markOver && o.threshold!=null){\n      for(let i=0;i<ser.values.length;i++){ if(ser.values[i]>o.threshold) s+=`<circle cx=\"${X(d[i]).toFixed(1)}\" cy=\"${Y(ser.values[i]).toFixed(1)}\" r=\"2.6\" fill=\"#ff5247\"/>`; }\n    }\n  });\n  return `<svg class=\"ch-svg\" viewBox=\"0 0 ${W} ${H}\" preserveAspectRatio=\"xMidYMid meet\" role=\"img\">${s}<\u002Fsvg>`;\n}\n\nfunction renderLapDetail(data){\n  currentLapData = data;\n  const lap=data.lap||{}, ch=data.channels||{}, an=data.analysis||{};\n  $(\"lap-time\").textContent = lap.time||\"—\";\n  $(\"lap-meta\").innerHTML = `<b>${esc(lap.car_name||\"\")}<\u002Fb> · ${esc(lap.track||\"\")}`+(an.reference?` · ${esc(t('lap_vs'))} ${esc(an.reference)}`:\"\");\n  const dist=ch.dist||[], body=$(\"lap-body\");\n  if(!dist.length){ body.innerHTML=`<div class=\"lap-msg\">${esc(t('lap_notele'))}<\u002Fdiv>`; return; }\n\n  const st=an.stats||{};\n  const sv=(keys,suf)=>{ for(const k of keys){ if(st[k]!=null) return st[k]+(suf||\"\"); } return \"–\"; };\n  const stats=`<div class=\"lap-stats\">`+\n    `<div class=\"tile\"><div class=\"k\">${esc(t('stat_coasting'))}<\u002Fdiv><div class=\"v mono\">${sv(['coasting_pct','coasting','coast_pct'],\" %\")}<\u002Fdiv><\u002Fdiv>`+\n    `<div class=\"tile\"><div class=\"k\">${esc(t('stat_wot'))}<\u002Fdiv><div class=\"v mono\">${sv(['full_throttle_pct','full_throttle','wot_pct','throttle_pct'],\" %\")}<\u002Fdiv><\u002Fdiv>`+\n    `<div class=\"tile\"><div class=\"k\">${esc(t('stat_griploss'))}<\u002Fdiv><div class=\"v mono\">${sv(['grip_loss_pct','grip_loss','slip_pct'],\" %\")}<\u002Fdiv><\u002Fdiv>`+\n    `<div class=\"tile\"><div class=\"k\">${esc(t('stat_maxspeed'))}<\u002Fdiv><div class=\"v mono\">${sv(['max_speed_kmh','max_speed','vmax'],\" km/h\")}<\u002Fdiv><\u002Fdiv>`+\n    `<div class=\"tile\"><div class=\"k\">${esc(t('stat_minspeed'))}<\u002Fdiv><div class=\"v mono\">${sv(['min_speed_kmh','min_speed','vmin'],\" km/h\")}<\u002Fdiv><\u002Fdiv>`+\n  `<\u002Fdiv>`;\n\n  const sp=ch.speed_kmh||[];\n  const spMin=Math.floor(Math.min.apply(null,sp)/20)*20, spMax=Math.ceil(Math.max.apply(null,sp)/20)*20;\n  const zones=an.delta_zones||[];\n  const INK=cssVar('--chart-ink');\n  const speedChart=`<div class=\"ch-block\"><div class=\"ch-title\"><span>${esc(t('ch_speed'))}<\u002Fspan><span class=\"ch-legend\"><span><i style=\"background:${INK}\"><\u002Fi>${esc(t('leg_speed'))}<\u002Fspan>${zones.length?'<span><i style=\"background:rgba(255,82,71,.5)\"><\u002Fi>'+esc(t('leg_loss'))+'<\u002Fspan>':''}<\u002Fspan><\u002Fdiv>`+\n    chartSVG({dist,height:190,yMin:spMin,yMax:spMax,yTicks:[spMin,(spMin+spMax)/2,spMax],bands:zones,series:[{values:sp,color:INK,width:2}]})+`<\u002Fdiv>`;\n\n  let deltaList='';\n  if(zones.length) deltaList=`<div class=\"ch-block\"><div class=\"ch-title\"><span>${esc(t('sec_losszones'))}<\u002Fspan><\u002Fdiv><div class=\"dz-list\">`+\n    zones.map(z=>`<div class=\"dz-row\"><span class=\"seg\">${z.from_m}–${z.to_m} m<\u002Fspan><span class=\"lost\">+${Number(z.lost_s).toFixed(2)} s<\u002Fspan><\u002Fdiv>`).join('')+`<\u002Fdiv><\u002Fdiv>`;\n\n  const tbChart=`<div class=\"ch-block\"><div class=\"ch-title\"><span>${esc(t('ch_inputs'))}<\u002Fspan><span class=\"ch-legend\"><span><i style=\"background:#2bd96b\"><\u002Fi>${esc(t('leg_throttle'))}<\u002Fspan><span><i style=\"background:#ff5247\"><\u002Fi>${esc(t('leg_brake'))}<\u002Fspan><\u002Fspan><\u002Fdiv>`+\n    chartSVG({dist,height:150,yMin:0,yMax:100,yTicks:[0,50,100],series:[{values:ch.throttle||[],color:'#2bd96b',width:1.8},{values:ch.brake||[],color:'#ff5247',width:1.8}]})+`<\u002Fdiv>`;\n\n  const allSlip=[].concat(ch.slip_fl||[],ch.slip_fr||[],ch.slip_rl||[],ch.slip_rr||[]);\n  const slipMax=Math.max(1.2, allSlip.length?Math.max.apply(null,allSlip):1.2);\n  const slipChart=`<div class=\"ch-block\"><div class=\"ch-title\"><span>${esc(t('ch_slip'))}<\u002Fspan><span class=\"ch-legend\">`+\n    `<span><i style=\"background:#4aa3ff\"><\u002Fi>${esc(t('tire_fl'))}<\u002Fspan><span><i style=\"background:#f0a830\"><\u002Fi>${esc(t('tire_fr'))}<\u002Fspan><span><i style=\"background:#b07cff\"><\u002Fi>${esc(t('tire_rl'))}<\u002Fspan><span><i style=\"background:${INK}\"><\u002Fi>${esc(t('tire_rr'))}<\u002Fspan><span><i style=\"background:#ff5247\"><\u002Fi>${esc(t('leg_over1'))}<\u002Fspan><\u002Fspan><\u002Fdiv>`+\n    chartSVG({dist,height:170,yMin:0,yMax:+slipMax.toFixed(1),yTicks:[0,0.5,1,+slipMax.toFixed(1)],threshold:1,thresholdLabel:t('grip_limit'),markOver:true,series:[\n      {values:ch.slip_fl||[],color:'#4aa3ff',width:1.5},{values:ch.slip_fr||[],color:'#f0a830',width:1.5},\n      {values:ch.slip_rl||[],color:'#b07cff',width:1.5},{values:ch.slip_rr||[],color:INK,width:1.5}\n    ]})+`<\u002Fdiv>`;\n\n  const sug=an.suggestions||[];\n  const sgBox=sug.length?`<div class=\"sg-box\"><div class=\"sg-head\">${esc(t('sec_suggestions'))}<\u002Fdiv><ul class=\"sg-list\">${sug.map(x=>`<li>${esc(typeof x==='string'?x:tSuggest(x))}<\u002Fli>`).join('')}<\u002Ful><\u002Fdiv>`:'';\n\n  body.innerHTML = stats + speedChart + deltaList + tbChart + slipChart + sgBox;\n}\nlet currentLapData=null;\n\nlet lapOpen=false;\nfunction openLap(id, meta){\n  lapOpen=true;\n  const sc=$(\"lap-scrim\"); sc.hidden=false; setTimeout(()=>sc.classList.add(\"show\"), 20);\n  $(\"lap-time\").textContent=\"—\";\n  $(\"lap-meta\").innerHTML=`<b>${esc(meta.car_name||\"\")}<\u002Fb> · ${esc(meta.track||\"\")}`;\n  $(\"lap-body\").innerHTML=`<div class=\"lap-msg\">${esc(t('lap_loading'))}<\u002Fdiv>`;\n  $(\"lap-close\").focus();\n  loadLap(id, meta);\n}\nasync function loadLap(id, meta){\n  let data;\n  try{\n    const r=await fetch('/api/lap/'+encodeURIComponent(id),{cache:'no-store'});\n    if(!r.ok) throw new Error(\"status \"+r.status);\n    data=await r.json();\n    if(!data || !data.channels || !data.channels.dist) throw new Error(\"kein channels\");\n  }catch(e){ data=genLapDetail(meta); }\n  if(!lapOpen) return;\n  renderLapDetail(data);\n}\nfunction closeLap(){\n  if(!lapOpen) return; lapOpen=false; currentLapData=null;\n  const sc=$(\"lap-scrim\"); sc.classList.remove(\"show\");\n  setTimeout(()=>{ if(!lapOpen){ sc.hidden=true; $(\"lap-body\").innerHTML=\"\"; } },300);\n}\n$(\"lap-close\").addEventListener(\"click\", closeLap);\n$(\"lap-scrim\").addEventListener(\"click\", e=>{ if(e.target===$(\"lap-scrim\")) closeLap(); });\ndocument.addEventListener(\"keydown\", e=>{ if(e.key===\"Escape\" && lapOpen) closeLap(); });\nfunction lapFromRow(tr){ return { lap_id:tr.dataset.lapid, time:tr.dataset.laptime, track:tr.dataset.laptrack, car_name:tr.dataset.lapcar }; }\nconst TRASH_SVG = '<svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M4 7h16\"/><path d=\"M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2\"/><path d=\"M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13\"/><path d=\"M10 11v6M14 11v6\"/><\u002Fsvg>';\nasync function deleteLap(id){\n  if(!id) return;\n  if(!confirm(t('del_confirm'))) return;\n  let done=false;\n  try{\n    const r=await fetch('/api/lap/'+encodeURIComponent(id),{method:'DELETE'});\n    if(r.ok){ const d=await r.json().catch(()=>null); if(d && d.deleted) done=true; }\n  }catch(e){}\n  if(!done){\n    // Vorschau ohne Backend: Runde lokal aus den Sample-/Sim-Daten entfernen\n    [SAMPLE, sim].forEach(src=>{ if(!src || !src.by_car) return;\n      src.by_car.forEach(c=>{ if(!c.laps) return; const before=c.laps.length;\n        c.laps=c.laps.filter(l=>l.lap_id!==id);\n        if(c.laps.length!==before && typeof c.lap_count==='number') c.lap_count=Math.max(0,c.lap_count-(before-c.laps.length));\n      });\n    });\n    lastCarsHash=\"\";   // Re-Render erzwingen, auch wenn /api/state denselben Stand liefert\n  }\n  loadState();\n}\n$(\"v-list\").addEventListener(\"click\", e=>{\n  const del=e.target.closest(\".lt-del\");\n  if(del){ e.stopPropagation(); e.preventDefault(); deleteLap(del.dataset.lapid); return; }\n  const tr=e.target.closest(\"tr.lt-click\"); if(tr) openLap(tr.dataset.lapid, lapFromRow(tr));\n});\n$(\"v-list\").addEventListener(\"keydown\", e=>{ if(e.key===\"Enter\"||e.key===\" \"){ const tr=e.target.closest(\"tr.lt-click\"); if(tr){ e.preventDefault(); openLap(tr.dataset.lapid, lapFromRow(tr)); } } });\n\n/* ============================================================\n   Vergleich / Compare\n   ============================================================ */\nconst CMP_A=\"#5ab0ff\", CMP_B=\"#ffa23d\";\nlet cmpSel = { track:null, a:null, b:null };\nlet cmpToken = 0;\n\nfunction cmpParseSec(str){\n  if(str==null) return null;\n  const s=String(str).trim();\n  const m=s.match(/^(?:(\\d+):)?(\\d+)(?:\\.(\\d+))?$/);\n  if(!m) { const f=parseFloat(s); return isFinite(f)?f:null; }\n  const min=m[1]?+m[1]:0, sec=+m[2], frac=m[3]?+(\"0.\"+m[3]):0;\n  return min*60+sec+frac;\n}\nfunction cmpFmtDelta(sec){\n  // DE: Punkt -> Komma\n  const v=Math.abs(sec).toFixed(3);\n  const sign = sec<0?\"\\u2212\":\"+\";   // minus-zeichen für „schneller\"\n  const num = (lang===\"de\") ? v.replace(\".\",\",\") : v;\n  return sign+num+\" s\";\n}\nfunction cmpList(){\n  const cars=(state&&state.by_car)||[];\n  const out=[];\n  cars.forEach(c=>{\n    (c.laps||[]).forEach(l=>{\n      if(l.has_telemetry && l.lap_id){\n        out.push({ lap_id:l.lap_id, car_name:c.name, class:c.class, pi:c.pi,\n          track:l.track, time:l.time, time_seconds:(l.time_seconds!=null?l.time_seconds:cmpParseSec(l.time)) });\n      }\n    });\n  });\n  return out;\n}\nfunction cmpOptLabel(it){\n  return `${it.car_name} \\u00b7 ${it.class||\"\\u2013\"} \\u00b7 PI ${it.pi!=null?it.pi:\"\\u2013\"} \\u00b7 ${it.time}`;\n}\nfunction buildCompare(){\n  const list=cmpList();\n  const empty=$(\"cmp-empty\"), ui=$(\"cmp-ui\");\n  if(!list.length){ empty.classList.remove(\"hidden\"); ui.classList.add(\"hidden\"); return; }\n  empty.classList.add(\"hidden\"); ui.classList.remove(\"hidden\");\n\n  const tracks=[...new Set(list.map(x=>x.track))];\n  if(!tracks.includes(cmpSel.track)) cmpSel.track=tracks[0];\n  const tsel=$(\"cmp-track\");\n  tsel.innerHTML=tracks.map(tr=>`<option value=\"${esc(tr)}\"${tr===cmpSel.track?\" selected\":\"\"}>${esc(tr)}<\u002Foption>`).join(\"\");\n\n  cmpRefreshLapSelectors(list, true);\n}\nfunction cmpRefreshLapSelectors(list, autopick){\n  list = list || cmpList();\n  const onTrack=list.filter(x=>x.track===cmpSel.track);\n  const ids=new Set(onTrack.map(x=>x.lap_id));\n  if(!ids.has(cmpSel.a)) cmpSel.a=null;\n  if(!ids.has(cmpSel.b)) cmpSel.b=null;\n  if(autopick){\n    if(!cmpSel.a && onTrack[0]) cmpSel.a=onTrack[0].lap_id;\n    if(!cmpSel.b && onTrack[1] && onTrack[1].lap_id!==cmpSel.a) cmpSel.b=onTrack[1].lap_id;\n  }\n  const optsFor=(selId, otherId)=>`<option value=\"\">${esc(t('cmp_pick'))}<\u002Foption>`+\n    onTrack.map(it=>`<option value=\"${esc(it.lap_id)}\"${it.lap_id===selId?\" selected\":\"\"}${it.lap_id===otherId?\" disabled\":\"\"}>${esc(cmpOptLabel(it))}<\u002Foption>`).join(\"\");\n  $(\"cmp-a\").innerHTML=optsFor(cmpSel.a, cmpSel.b);\n  $(\"cmp-b\").innerHTML=optsFor(cmpSel.b, cmpSel.a);\n  cmpRun(list);\n}\n$(\"cmp-track\").addEventListener(\"change\", e=>{ cmpSel.track=e.target.value; cmpSel.a=null; cmpSel.b=null; cmpRefreshLapSelectors(null,true); });\n$(\"cmp-a\").addEventListener(\"change\", e=>{ cmpSel.a=e.target.value||null; cmpRefreshLapSelectors(null,false); });\n$(\"cmp-b\").addEventListener(\"change\", e=>{ cmpSel.b=e.target.value||null; cmpRefreshLapSelectors(null,false); });\n\nasync function cmpLoadLap(item){\n  if(!item) return null;\n  const meta={ lap_id:item.lap_id, time:item.time, track:item.track, car_name:item.car_name };\n  let data;\n  try{\n    const r=await fetch('/api/lap/'+encodeURIComponent(item.lap_id),{cache:'no-store'});\n    if(!r.ok) throw 0;\n    data=await r.json();\n    if(!data || !data.channels || !data.channels.dist) throw 0;\n  }catch(e){ data=genLapDetail(meta); }\n  const lap=data.lap||{};\n  if(lap.time_seconds==null) lap.time_seconds=item.time_seconds;\n  if(!lap.car_name) lap.car_name=item.car_name;\n  if(lap.time==null) lap.time=item.time;\n  return { item, lap, ch:data.channels||{} };\n}\nfunction cmpResample(srcDist, srcVals, grid){\n  const out=new Array(grid.length); let j=0;\n  for(let i=0;i<grid.length;i++){\n    const x=grid[i];\n    while(j<srcDist.length-2 && srcDist[j+1]<x) j++;\n    const x0=srcDist[j], x1=srcDist[j+1], y0=srcVals[j]||0, y1=srcVals[j+1]||0;\n    if(x1===x0){ out[i]=y0; continue; }\n    let tt=(x-x0)/(x1-x0); if(tt<0)tt=0; if(tt>1)tt=1;\n    out[i]=y0+(y1-y0)*tt;\n  }\n  return out;\n}\nfunction cmpMeanSlip(ch){\n  const a=ch.slip_fl||[],b=ch.slip_fr||[],c=ch.slip_rl||[],d=ch.slip_rr||[];\n  const n=Math.max(a.length,b.length,c.length,d.length), o=new Array(n);\n  for(let i=0;i<n;i++) o[i]=((a[i]||0)+(b[i]||0)+(c[i]||0)+(d[i]||0))/4;\n  return o;\n}\nasync function cmpRun(list){\n  list = list || cmpList();\n  const byId=Object.fromEntries(list.map(x=>[x.lap_id,x]));\n  const itA = cmpSel.a?byId[cmpSel.a]:null, itB = cmpSel.b?byId[cmpSel.b]:null;\n  const out=$(\"cmp-out\");\n  if(!itA && !itB){ out.innerHTML=\"\"; return; }\n  const my= ++cmpToken;\n  out.innerHTML=`<div class=\"cmp-loading\">${esc(t('cmp_loading'))}<\u002Fdiv>`;\n  const [A,B]=await Promise.all([cmpLoadLap(itA), cmpLoadLap(itB)]);\n  if(my!==cmpToken) return;   // veraltet (Auswahl hat sich geändert)\n  cmpRenderOut(A,B);\n}\nfunction cmpCard(side, L){\n  if(!L) return \"\";\n  const it=L.item, lap=L.lap;\n  return `<div class=\"cmp-card ${side}\">`+\n    `<div class=\"cc-tag\"><span class=\"k\"><\u002Fspan>${side===\"a\"?esc(t('cmp_lap_a')):esc(t('cmp_lap_b'))}<\u002Fdiv>`+\n    `<div class=\"cc-name\">${carNameHTML(it.car_name,'cyf')}<\u002Fdiv>`+\n    `<div class=\"cc-sub\"><span>${esc(it.class||\"\\u2013\")}<\u002Fspan><span>\\u00b7<\u002Fspan><span>PI ${esc(it.pi!=null?it.pi:\"\\u2013\")}<\u002Fspan><span>\\u00b7<\u002Fspan><span>${esc(it.track)}<\u002Fspan><\u002Fdiv>`+\n    `<div class=\"cc-time\">${esc(lap.time||it.time||\"\\u2014\")}<\u002Fdiv>`+\n  `<\u002Fdiv>`;\n}\nfunction cmpRenderOut(A,B){\n  const out=$(\"cmp-out\");\n  // Kopf\n  let diffHtml=\"\";\n  if(A&&B){\n    const sa=A.lap.time_seconds, sb=B.lap.time_seconds;\n    let cls=\"neutral\", txt=\"\\u2014\";\n    if(sa!=null&&sb!=null){ const d=sb-sa; cls=d<-1e-9?\"faster\":(d>1e-9?\"slower\":\"neutral\"); txt=cmpFmtDelta(d); }\n    diffHtml=`<div class=\"cmp-diff\"><div class=\"dk\">${esc(t('cmp_diff'))}<\u002Fdiv><div class=\"dv ${cls}\">${esc(txt)}<\u002Fdiv><\u002Fdiv>`;\n  } else {\n    diffHtml=`<div class=\"cmp-diff\"><\u002Fdiv>`;\n  }\n  const head=`<div class=\"cmp-head\">${cmpCard(\"a\",A)||'<div><\u002Fdiv>'}${diffHtml}${cmpCard(\"b\",B)||'<div><\u002Fdiv>'}<\u002Fdiv>`;\n\n  // gemeinsame Distanz-Achse\n  const da=A?(A.ch.dist||[]):[], db=B?(B.ch.dist||[]):[];\n  let grid, aOn, bOn;\n  if(A&&B){\n    const end=Math.min(da[da.length-1]||0, db[db.length-1]||0)||Math.max(da[da.length-1]||0,db[db.length-1]||0)||1;\n    const N=220; grid=[]; for(let i=0;i<N;i++) grid.push(end*i/(N-1));\n    aOn=ch=>cmpResample(da, ch, grid);\n    bOn=ch=>cmpResample(db, ch, grid);\n  } else if(A){ grid=da; aOn=ch=>ch; }\n  else { grid=db; bOn=ch=>ch; }\n\n  const legA=`<span><i style=\"background:${CMP_A}\"><\u002Fi>A<\u002Fspan>`;\n  const legB=`<span><i style=\"background:${CMP_B}\"><\u002Fi>B<\u002Fspan>`;\n  const leg = (A&&B)?(legA+legB):(A?legA:legB);\n\n  // Speed\n  const spVals=[].concat(A?(A.ch.speed_kmh||[]):[], B?(B.ch.speed_kmh||[]):[]).filter(v=>v!=null);\n  const spMin=Math.floor(Math.min.apply(null,spVals)/20)*20, spMax=Math.ceil(Math.max.apply(null,spVals)/20)*20;\n  const spSeries=[];\n  if(A) spSeries.push({values:aOn(A.ch.speed_kmh||[]),color:CMP_A,width:2.2});\n  if(B) spSeries.push({values:bOn(B.ch.speed_kmh||[]),color:CMP_B,width:2.2});\n  const speedChart=`<div class=\"ch-block\"><div class=\"ch-title\"><span>${esc(t('ch_speed'))}<\u002Fspan><span class=\"ch-legend\">${leg}<\u002Fspan><\u002Fdiv>`+\n    chartSVG({dist:grid,height:230,yMin:spMin,yMax:spMax,yTicks:[spMin,(spMin+spMax)/2,spMax],yfmt:v=>v,series:spSeries})+`<\u002Fdiv>`;\n\n  // Gas (+ Bremse gestrichelt)\n  const inSeries=[];\n  if(A){ inSeries.push({values:aOn(A.ch.throttle||[]),color:CMP_A,width:2}); inSeries.push({values:aOn(A.ch.brake||[]),color:CMP_A,width:1.4,dash:\"4 3\",opacity:.85}); }\n  if(B){ inSeries.push({values:bOn(B.ch.throttle||[]),color:CMP_B,width:2}); inSeries.push({values:bOn(B.ch.brake||[]),color:CMP_B,width:1.4,dash:\"4 3\",opacity:.85}); }\n  const inLeg = leg + `<span><i style=\"background:${CMP_A};height:2px\"><\u002Fi>${esc(t('leg_throttle'))}<\u002Fspan><span><i style=\"background:var(--txt2);height:0;border-top:2px dashed var(--txt2)\"><\u002Fi>${esc(t('leg_brake'))}<\u002Fspan>`;\n  const inChart=`<div class=\"ch-block\"><div class=\"ch-title\"><span>${esc(t('ch_inputs'))}<\u002Fspan><span class=\"ch-legend\">${inLeg}<\u002Fspan><\u002Fdiv>`+\n    chartSVG({dist:grid,height:160,yMin:0,yMax:100,yTicks:[0,50,100],series:inSeries})+`<\u002Fdiv>`;\n\n  // Reifen-Slip (Mittel der 4 Räder)\n  const slipA=A?cmpMeanSlip(A.ch):[], slipB=B?cmpMeanSlip(B.ch):[];\n  const allSlip=[].concat(slipA,slipB).filter(v=>v!=null);\n  const slipMax=Math.max(1.2, allSlip.length?Math.max.apply(null,allSlip):1.2);\n  const slipSeries=[];\n  if(A) slipSeries.push({values:A&&B?cmpResample(da,slipA,grid):slipA,color:CMP_A,width:1.8});\n  if(B) slipSeries.push({values:A&&B?cmpResample(db,slipB,grid):slipB,color:CMP_B,width:1.8});\n  const slipChart=`<div class=\"ch-block\"><div class=\"ch-title\"><span>${esc(t('ch_slip'))}<\u002Fspan><span class=\"ch-legend\">${leg}<span><i style=\"background:#ff5247\"><\u002Fi>${esc(t('leg_over1'))}<\u002Fspan><\u002Fspan><\u002Fdiv>`+\n    chartSVG({dist:grid,height:170,yMin:0,yMax:+slipMax.toFixed(1),yTicks:[0,0.5,1,+slipMax.toFixed(1)],threshold:1,thresholdLabel:t('grip_limit'),series:slipSeries})+`<\u002Fdiv>`;\n\n  // KPIs\n  const vmax=arr=>arr&&arr.length?Math.round(Math.max.apply(null,arr)):null;\n  const vmin=arr=>arr&&arr.length?Math.round(Math.min.apply(null,arr)):null;\n  const spA=A?(A.ch.speed_kmh||[]):null, spB=B?(B.ch.speed_kmh||[]):null;\n  const kpiVal=(va,vb,suf)=>{\n    let s=\"\";\n    if(A) s+=`<span class=\"ka\">${va!=null?va+(suf||\"\"):\"\\u2013\"}<\u002Fspan>`;\n    if(A&&B) s+=`<span class=\"ksep\">/<\u002Fspan>`;\n    if(B) s+=`<span class=\"kb\">${vb!=null?vb+(suf||\"\"):\"\\u2013\"}<\u002Fspan>`;\n    return s;\n  };\n  const kpis=`<div class=\"cmp-kpis\">`+\n    `<div class=\"cmp-kpi\"><span class=\"kk\">${esc(t('cmp_maxspeed'))}<\u002Fspan><span class=\"kab\">${kpiVal(vmax(spA),vmax(spB),\" km/h\")}<\u002Fspan><\u002Fdiv>`+\n    `<div class=\"cmp-kpi\"><span class=\"kk\">${esc(t('cmp_minspeed'))}<\u002Fspan><span class=\"kab\">${kpiVal(vmin(spA),vmin(spB),\" km/h\")}<\u002Fspan><\u002Fdiv>`+\n  `<\u002Fdiv>`;\n\n  out.innerHTML = head + kpis + speedChart + inChart + slipChart;\n}\n\n/* ============================================================\n   Akustische Signale (Web Audio API)\n   ============================================================ */\nconst AC=new (window.AudioContext||window.webkitAudioContext)();\nlet _vol=1;\nfunction tone(freq,start,dur,type=\"sine\",gain=0.25){\n  const o=AC.createOscillator(),g=AC.createGain();\n  o.type=type;o.frequency.value=freq;o.connect(g);g.connect(AC.destination);\n  const t0=AC.currentTime+start;\n  g.gain.setValueAtTime(0.0001,t0);\n  g.gain.exponentialRampToValueAtTime(Math.max(0.0001,gain*_vol),t0+0.012);\n  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);\n  o.start(t0);o.stop(t0+dur+0.03);\n}\nconst SOUNDS={\n  beep:()=>tone(880,0,0.15), double:()=>{tone(880,0,0.10);tone(880,0.14,0.10);},\n  blip:()=>tone(1320,0,0.09,\"square\",0.18), soft:()=>tone(660,0,0.28,\"triangle\",0.28),\n  chime_up:()=>{tone(660,0,0.13);tone(990,0.12,0.20);},\n  chime_down:()=>{tone(990,0,0.13);tone(660,0.12,0.20);},\n  start_lights:()=>{tone(700,0,0.12,\"square\",0.16);tone(700,0.28,0.12,\"square\",0.16);tone(700,0.56,0.12,\"square\",0.16);tone(1100,0.9,0.32,\"sawtooth\",0.2);},\n  success:()=>{tone(523,0,0.12);tone(659,0.12,0.12);tone(784,0.24,0.26);},\n};\nfunction playSound(key,vol){ if(!key||key===\"none\")return; if(AC.state===\"suspended\")AC.resume(); _vol=(vol==null?1:vol); (SOUNDS[key]||(()=>{}))(); }\n\nconst SOUND_OPTS=[\"none\",\"beep\",\"double\",\"blip\",\"soft\",\"chime_up\",\"chime_down\",\"start_lights\",\"success\"];\nconst SND_DEFAULTS={ snd_master:false, first_lights:false,\n  start_on:true, start_sound:\"beep\", start_vol:80,\n  finish_on:true, finish_sound:\"double\", finish_vol:80,\n  pb_on:true, pb_sound:\"success\", pb_vol:80 };\nconst snd={};\nfunction sndLoad(){\n  for(const k in SND_DEFAULTS){\n    let v=SND_DEFAULTS[k];\n    try{ const raw=localStorage.getItem(\"snd_\"+k); if(raw!=null){ v=(typeof SND_DEFAULTS[k]===\"boolean\")?(raw===\"1\"):(typeof SND_DEFAULTS[k]===\"number\"?(+raw):raw); } }catch(e){}\n    snd[k]=v;\n  }\n}\nfunction sndSave(k){ try{ const v=snd[k]; localStorage.setItem(\"snd_\"+k, typeof v===\"boolean\"?(v?\"1\":\"0\"):String(v)); }catch(e){} }\nfunction sndOptLabel(key){ return key===\"none\"?t('snd_none'):key.replace(/_/g,\" \").replace(/\\b\\w/g,c=>c.toUpperCase()); }\nfunction sndFillSelect(id){\n  const el=$(id); if(!el) return;\n  el.innerHTML=SOUND_OPTS.map(o=>`<option value=\"${o}\"${snd[id]===o?\" selected\":\"\"}>${esc(sndOptLabel(o))}<\u002Foption>`).join(\"\");\n}\nfunction sndSyncUI(){\n  $(\"snd_master\").checked=snd.snd_master;\n  $(\"first_lights\").checked=snd.first_lights;\n  [\"start\",\"finish\",\"pb\"].forEach(p=>{\n    $(p+\"_on\").checked=snd[p+\"_on\"];\n    sndFillSelect(p+\"_sound\");\n    const vol=$(p+\"_vol\"); vol.value=snd[p+\"_vol\"]; $(p+\"_vol_val\").textContent=snd[p+\"_vol\"]+\"%\";\n  });\n  $(\"snd-detail\").classList.toggle(\"off\", !snd.snd_master);\n}\nfunction sndWire(){\n  sndLoad(); sndSyncUI();\n  $(\"snd_master\").addEventListener(\"change\", e=>{\n    snd.snd_master=e.target.checked; sndSave(\"snd_master\");\n    if(snd.snd_master && AC.state===\"suspended\") AC.resume();\n    $(\"snd-detail\").classList.toggle(\"off\", !snd.snd_master);\n  });\n  $(\"first_lights\").addEventListener(\"change\", e=>{ snd.first_lights=e.target.checked; sndSave(\"first_lights\"); });\n  [\"start\",\"finish\",\"pb\"].forEach(p=>{\n    $(p+\"_on\").addEventListener(\"change\", e=>{ snd[p+\"_on\"]=e.target.checked; sndSave(p+\"_on\"); });\n    $(p+\"_sound\").addEventListener(\"change\", e=>{ snd[p+\"_sound\"]=e.target.value; sndSave(p+\"_sound\"); });\n    $(p+\"_vol\").addEventListener(\"input\", e=>{ snd[p+\"_vol\"]=+e.target.value; $(p+\"_vol_val\").textContent=snd[p+\"_vol\"]+\"%\"; sndSave(p+\"_vol\"); });\n  });\n  document.querySelectorAll(\".snd-test\").forEach(b=>b.addEventListener(\"click\", ()=>{\n    const p=b.dataset.test; if(AC.state===\"suspended\")AC.resume();\n    playSound(snd[p+\"_sound\"], snd[p+\"_vol\"]/100);\n  }));\n}\n\n/* ---- Ereignis-Erkennung im Poll-Loop ---- */\nlet prevHasLap=false, prevTopKey=null, firstLightsArmed=true, sndInited=false, suppressNextStart=false;\nfunction lapKey(lap){ return lap?((lap.lap_id||\"\")+\"|\"+(lap.time||\"\")+\"|\"+(lap.car_name||\"\")+\"|\"+(lap.track||\"\")):null; }\nfunction soundPoll(s){\n  const hasLap = !!(s && s.current_lap != null);\n  const top = (s && s.last_laps && s.last_laps[0]) || null;\n  const topKey = lapKey(top);\n  if(s && s.in_world === false) firstLightsArmed = true;   // für nächste Session scharf\n\n  if(sndInited && snd.snd_master){\n    if(topKey && prevTopKey!==null && topKey!==prevTopKey){      // Runde beendet (= Ziellinie)\n      const lap = top || {};\n      const best = s.session_best;\n      const isRecord = (lap.is_record!=null) ? !!lap.is_record\n        : !!(best && lap.time_seconds!=null && Math.abs(lap.time_seconds-best.time_seconds)<1e-6 && lap.track===best.track && lap.car_name===best.car_name);\n      if(isRecord && snd.pb_on)      playSound(snd.pb_sound, snd.pb_vol/100);\n      else if(snd.finish_on)         playSound(snd.finish_sound, snd.finish_vol/100);\n      if(snd.start_on)               setTimeout(()=>playSound(snd.start_sound, snd.start_vol/100), 350);\n      suppressNextStart = true;      // den unmittelbar folgenden Linien-Start nicht doppelt spielen\n    } else if(hasLap && !prevHasLap){                            // erste Linien-Überquerung\n      if(suppressNextStart){ suppressNextStart=false; }\n      else if(snd.first_lights && firstLightsArmed){ playSound(\"start_lights\", snd.start_vol/100); firstLightsArmed=false; }\n      else if(snd.start_on)          playSound(snd.start_sound, snd.start_vol/100);\n    }\n  }\n  prevHasLap=hasLap; prevTopKey=topKey; sndInited=true;   // erster Poll: nur initialisieren\n}\n\n/* boot */\n$(\"langsel\").addEventListener(\"click\", e=>{ const b=e.target.closest(\"button\"); if(b) setLang(b.dataset.lang); });\ndocument.querySelectorAll(\"#langsel button\").forEach(b=>b.classList.toggle(\"active\", b.dataset.lang===lang));\napplyAppearance();\nsndWire();\napplyStaticI18n();\nwireDrop($(\"s-carimg\"), ()=>currentCarSlug);\nloadState();\nsetInterval(loadState, 400);\nrequestAnimationFrame(tickClock);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
