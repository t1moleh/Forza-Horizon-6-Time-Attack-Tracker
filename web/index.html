  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  /* ===== Time Attack — FH6 · dark / neon ===== */\n  :root{\n    --bg:#060708;\n    --panel:#0c0e11;\n    --panel2:#101317;\n    --raise:#15181d;\n    --line:rgba(255,255,255,.07);\n    --line2:rgba(255,255,255,.13);\n    --txt:#edeff2;\n    --txt2:#969ca5;\n    --txt3:#5d636b;\n    --accent:#2bd96b;                  /* themeable neon accent — best / active / brand */\n    --accent-soft:rgba(43,217,107,.10);\n    --accent-glow:rgba(43,217,107,.7);\n    --accent-ink:#05140a;              /* dark text on accent fills */\n    --good:#2bd96b;                    /* faster */\n    --red:#ff5247;                     /* slower / disconnected */\n    --focus:#2bd96b;\n    --ui:'Barlow Semi Condensed',system-ui,sans-serif;\n    --head:'Chakra Petch',sans-serif;\n    --digit:'JetBrains Mono';\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html,body{height:100%}\n  body{\n    background:var(--bg);\n    color:var(--txt);\n    font-family:var(--ui);\n    font-size:17px;\n    line-height:1.4;\n    letter-spacing:.2px;\n    -webkit-font-smoothing:antialiased;\n    background-image:radial-gradient(1200px 600px at 70% -10%, var(--accent-soft), transparent 60%);\n  }\n  .mono{font-family:var(--digit),'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-feature-settings:\"tnum\" 1}\n  .wrap{max-width:1320px;margin:0 auto;padding:0 28px 64px}\n\n  /* ---------- Header ---------- */\n  header{\n    position:sticky;top:0;z-index:40;\n    background:rgba(6,7,8,.86);\n    backdrop-filter:blur(14px);\n    border-bottom:1px solid var(--line);\n  }\n  .hbar{max-width:1320px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}\n  .brand{display:flex;align-items:center;gap:11px;flex:none}\n  .brand .sq{width:13px;height:13px;background:var(--accent);box-shadow:0 0 14px var(--accent-glow);transform:rotate(45deg)}\n  .brand .name{font-family:var(--head);font-weight:700;letter-spacing:3px;font-size:16px;text-transform:uppercase}\n  .brand .tag{font-family:var(--head);font-size:11px;letter-spacing:2px;color:var(--txt3);border:1px solid var(--line2);padding:1px 6px;border-radius:3px}\n\n  nav.tabs{display:flex;gap:4px;margin-left:8px;flex-wrap:wrap}\n  nav.tabs button{\n    appearance:none;background:none;border:none;cursor:pointer;\n    color:var(--txt2);font-family:var(--head);font-weight:600;\n    font-size:14px;letter-spacing:2px;text-transform:uppercase;\n    padding:9px 16px;border-radius:6px;position:relative;transition:color .15s,background .15s;\n  }\n  nav.tabs button:hover{color:var(--txt)}\n  nav.tabs button.active{color:var(--txt);background:var(--panel2)}\n  nav.tabs button.active::after{\n    content:\"\";position:absolute;left:16px;right:16px;bottom:3px;height:2px;\n    background:var(--accent);box-shadow:0 0 10px var(--accent-glow);border-radius:2px;\n  }\n\n  .hright{margin-left:auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap}\n  .status{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--txt2);letter-spacing:.5px}\n  .status .dot{width:9px;height:9px;border-radius:50%;background:var(--txt3);transition:background .2s,box-shadow .2s}\n  .status.on .dot{background:var(--good);box-shadow:0 0 10px var(--accent-glow);animation:pulseDot 2s ease-in-out infinite}\n  .status.off .dot{background:var(--red);box-shadow:0 0 8px rgba(255,82,71,.6)}\n  @keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.45}}\n\n  .digitsel{display:flex;border:1px solid var(--line2);border-radius:6px;overflow:hidden}\n  .digitsel button{appearance:none;border:none;cursor:pointer;background:transparent;color:var(--txt3);\n    padding:6px 11px;font-size:12px;letter-spacing:1px;font-family:var(--head);font-weight:600;transition:.15s}\n  .digitsel button:hover{color:var(--txt2)}\n  .digitsel button.active{background:var(--panel2);color:var(--accent)}\n\n  .telembtn{appearance:none;cursor:pointer;display:flex;align-items:center;gap:8px;\n    font-family:var(--head);font-weight:600;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);\n    background:transparent;border:1px solid var(--line2);border-radius:6px;padding:7px 12px;transition:.15s}\n  .telembtn:hover{color:var(--txt);border-color:var(--accent)}\n  .telembtn .tdot{width:7px;height:7px;background:var(--accent);box-shadow:0 0 8px var(--accent-glow);transform:rotate(45deg);flex:none}\n  .telembtn.open{background:var(--panel2);color:var(--accent);border-color:var(--accent)}\n\n  /* ---------- Panels ---------- */\n  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px}\n  .seclabel{display:flex;align-items:center;gap:10px;font-family:var(--head);font-weight:600;\n    font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--txt3);margin-bottom:14px}\n  .seclabel::before{content:\"\";width:6px;height:6px;background:var(--accent);transform:rotate(45deg);flex:none}\n\n  /* ---------- Session hero ---------- */\n  main{padding-top:30px}\n  .hero{display:grid;grid-template-columns:340px 1fr;gap:34px;padding:30px;align-items:center}\n  /* freigestelltes Bild — KEIN Kasten dahinter */\n  .carimg{\n    aspect-ratio:1/1;position:relative;cursor:pointer;\n    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:9px;\n    filter:drop-shadow(0 18px 30px rgba(0,0,0,.55));transition:transform .15s;\n  }\n  .carimg.has-img{background-size:contain;background-repeat:no-repeat;background-position:center}\n  .carimg:not(.has-img){border:1px dashed var(--line2);border-radius:14px;filter:none}\n  .carimg.drag{border:1px dashed var(--accent);box-shadow:0 0 26px var(--accent-soft)}\n  .carimg .ph-ic{width:46px;height:46px;border:1.5px dashed var(--txt3);border-radius:8px;opacity:.5}\n  .carimg .ph-tx{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--txt3);\n    text-transform:lowercase;text-align:center;padding:0 ;\n  const cands = imgCandidates(slug, explicit);\n  let i = 0;\n  function placeholder(){\n    el.classList.remove(\"has-img\"); el.style.backgroundImage = \"\";\n    if(small){ el.innerHTML = '<span class=\"vph\"><\u002Fspan>'; }\n    else {\n      el.innerHTML = slug\n        ? `<div class=\"ph-ic\"><\u002Fdiv><div class=\"ph-tx\">cars/${esc(slug)}.png<\u002Fdiv><div class=\"ph-hint\">${esc(t('img_drophint'))}<\u002Fdiv>`\n        : `<div class=\"ph-ic\"><\u002Fdiv><div class=\"ph-tx\">${esc(t('img_placeholder'))}<\u002Fdiv>`;\n    }\n  }\n  function tryNext(){\n    if(i >= cands.length){ placeholder(); return; }\n    const url = cands[i++];\n    const im = new Image();\n    im.onload = ()=>{ el.classList.add(\"has-img\"); el.innerHTML = \"\"; el.style.backgroundImage = 'url(\"'+String(url).replace(/\"/g,'\\\\\"')+'\")'; };\n    im.onerror = tryNext;\n    im.src = url;\n  }\n  tryNext();\n}\nfunction saveCarImage(slug, file, el){\n  if(!slug || !file || !file.type.startsWith(\"image/\")) return;\n  const r = new FileReader();\n  r.onload = ()=>{ try{ localStorage.setItem(\"fh6_carimg_\"+slug, r.result); }catch(e){ alert(t('img_toolarge')); return; } paintCarImage(el, slug, null); };\n  r.readAsDataURL(file);\n}\nfunction wireDrop(el, getSlug){\n  if(!el || el.dataset.wired) return; el.dataset.wired = \"1\";\n  el.addEventListener(\"dragover\", e=>{ e.preventDefault(); el.classList.add(\"drag\"); });\n  el.addEventListener(\"dragleave\", ()=> el.classList.remove(\"drag\"));\n  el.addEventListener(\"drop\", e=>{ e.preventDefault(); el.classList.remove(\"drag\");\n    const f = e.dataTransfer.files && e.dataTransfer.files[0]; saveCarImage(getSlug(), f, el); });\n  el.addEventListener(\"click\", e=>{ e.preventDefault(); e.stopPropagation();\n    const slug = getSlug(); if(!slug) return;\n    const inp = document.createElement(\"input\"); inp.type = \"file\"; inp.accept = \"image/*\";\n    inp.onchange = ()=> saveCarImage(slug, inp.files[0], el); inp.click(); });\n}\n\n/* ============================================================\n   State / rendering\n   ============================================================ */\nlet state = null;\nlet prevBestSeconds = Infinity;\nlet prevTopLapKey = null;\nlet lastStaticHash = \"\";\nlet lastOverallHash = \"\";\nlet lastCarsHash = \"\";\n\nfunction applyState(s){\n  state = s;\n  state._t = performance.now();\n\n  // new best detection (works for live backend + sample)\n  const bs = s.session_best ? s.session_best.time_seconds : Infinity;\n  if(prevBestSeconds !== Infinity && bs < prevBestSeconds - 0.0005){\n    flashBest();\n  }\n  prevBestSeconds = bs;\n\n  renderStatus(s);\n  // session static parts only re-render when changed (preserves animations)\n  const sh = JSON.stringify([s.current_car, s.session_best, s.last_laps, s.cars_used]);\n  if(sh !== lastStaticHash){ renderSessionStatic(s); lastStaticHash = sh; }\n\n  const oh = JSON.stringify(s.overall);\n  if(oh !== lastOverallHash){ renderOverall(s); lastOverallHash = oh; }\n\n  const ch = JSON.stringify(s.by_car);\n  if(ch !== lastCarsHash){ renderCars(s); lastCarsHash = ch; }\n}\n\nfunction renderStatus(s){\n  const el = $(\"status\");\n  const txt = el.querySelector(\".stxt\");\n  if(s.connected){\n    el.className = \"status on\";\n    txt.textContent = s.in_world ? t('status_ingame') : t('status_menu');\n  } else {\n    el.className = \"status off\";\n    txt.textContent = t('status_disconnected');\n  }\n}\n\nfunction renderSessionStatic(s){\n  const car = s.current_car || {};\n  $(\"s-carname\").textContent = car.name || \"—\";\n  currentCarSlug = carSlug(car.name);\n  paintCarImage($(\"s-carimg\"), currentCarSlug, car.image);\n\n  const pc = clsColor(car.class);\n  $(\"s-meta\").innerHTML =\n    `<span class=\"seg\"><span class=\"classpill\" style=\"color:${pc};border-color:${pc}\">${esc(car.class||\"–\")}<\u002Fspan><\u002Fspan>`+\n    `<span class=\"sep\">·<\u002Fspan>`+\n    `<span class=\"seg\"><span class=\"pibadge\" style=\"background:${pc}\">${esc(car.pi!=null?car.pi:\"–\")}<\u002Fspan><span style=\"color:var(--txt3);font-size:13px;letter-spacing:1px\">PI<\u002Fspan><\u002Fspan>`+\n    `<span class=\"sep\">·<\u002Fspan>`+\n    `<span class=\"seg\">${esc(car.drivetrain||\"–\")}<\u002Fspan>`;\n\n  // best card\n  const sb = s.session_best || {};\n  $(\"s-besttime\").textContent = sb.time || \"—\";\n  $(\"s-bestsub\").innerHTML = sb.car_name\n    ? `<span><b>${esc(sb.car_name)}<\u002Fb><\u002Fspan><span>${esc(sb.track||\"\")}<\u002Fspan>`\n    : `<span>${esc(t('best_none'))}<\u002Fspan>`;\n\n  // last laps\n  const ll = s.last_laps || [];\n  const topKey = ll.length ? (ll[0].time+\"|\"+ll[0].car_name+\"|\"+ll[0].track) : null;\n  const isNewTop = prevTopLapKey !== null && topKey !== null && topKey !== prevTopLapKey;\n  $(\"s-laplist\").innerHTML = ll.length ? ll.map((l,i)=>{\n    const pc = clsColor(l.class);\n    const slide = (i===0 && isNewTop) ? \" slidein\" : \"\";\n    return `<div class=\"laprow${slide}\">`+\n      `<div class=\"lt mono\">${esc(l.time)}<\u002Fdiv>`+\n      `<div class=\"lc\"><b>${esc(l.car_name)}<\u002Fb>${esc(l.track||\"\")}<\u002Fdiv>`+\n      `<span class=\"cls-sm\" style=\"color:${pc};border-color:${pc}\">${esc(l.class||\"–\")}<\u002Fspan>`+\n    `<\u002Fdiv>`;\n  }).join(\"\") : `<div class=\"empty\">${esc(t('laps_none'))}<\u002Fdiv>`;\n  prevTopLapKey = topKey;\n\n  // cars used\n  const cu = s.cars_used || [];\n  $(\"s-carsused\").innerHTML = cu.length ? cu.map(c=>{\n    const pc = clsColor(c.class);\n    return `<div class=\"curow\">`+\n      `<div class=\"ct-img\" data-slug=\"${esc(carSlug(c.car_name))}\" data-img=\"${esc(c.image||'')}\"><\u002Fdiv>`+\n      `<div class=\"cn\">${esc(c.car_name)}<\u002Fdiv>`+\n      `<div class=\"cmeta\">`+\n        `<span class=\"cls-sm\" style=\"color:${pc};border-color:${pc}\">${esc(c.class||\"–\")}<\u002Fspan>`+\n        `<span class=\"pi-sm\" style=\"background:${pc}\">${esc(c.pi!=null?c.pi:\"–\")}<\u002Fspan>`+\n      `<\u002Fdiv>`+\n      `<div class=\"laps\">${esc(c.lap_count!=null?c.lap_count:\"–\")} ${esc(t('laps_abbr'))}<\u002Fdiv>`+\n      `<div class=\"cb mono\">${esc(c.best||\"—\")}<\u002Fdiv>`+\n    `<\u002Fdiv>`;\n  }).join(\"\") : `<div class=\"empty\">${esc(t('cars_none'))}<\u002Fdiv>`;\n  $(\"s-carsused\").querySelectorAll(\".ct-img\").forEach(el=>{ paintCarImage(el, el.dataset.slug, el.dataset.img||null); wireDrop(el, ()=>el.dataset.slug); });\n}\n\nfunction renderOverall(s){\n  const rows = s.overall || [];\n  const groups = {};\n  const order = [];\n  rows.forEach(r=>{ if(!groups[r.track]){ groups[r.track]=[]; order.push(r.track); } groups[r.track].push(r); });\n\n  const html = order.map(track=>{\n    const list = groups[track].slice().sort((a,b)=>(a.rank||999)-(b.rank||999));\n    const body = list.map(r=>{\n      const pc = clsColor(r.class);\n      const top = r.rank===1 ? \" top1\" : \"\";\n      return `<tr class=\"${top.trim()}\">`+\n        `<td class=\"rk\">${esc(r.rank)}<\u002Ftd>`+\n        `<td class=\"carcell\">${esc(r.car_name)}<\u002Ftd>`+\n        `<td class=\"cell-cls\"><span class=\"cls-sm\" style=\"color:${pc};border-color:${pc}\">${esc(r.class||\"–\")}<\u002Fspan><\u002Ftd>`+\n        `<td class=\"cell-pi\"><span class=\"pi-sm\" style=\"background:${pc}\">${esc(r.pi!=null?r.pi:\"–\")}<\u002Fspan><\u002Ftd>`+\n        `<td class=\"cell-time\">${esc(r.time)}<\u002Ftd>`+\n      `<\u002Ftr>`;\n    }).join(\"\");\n    return `<div class=\"grouphd\"><span class=\"tn\">${esc(track)}<\u002Fspan><span class=\"ln\"><\u002Fspan><span class=\"ct\">${esc(tp('entries',{n:list.length}))}<\u002Fspan><\u002Fdiv>`+\n      `<div class=\"panel\" style=\"overflow:hidden\"><table class=\"ot\"><thead><tr>`+\n      `<th style=\"width:54px\">${esc(t('th_rank'))}<\u002Fth><th>${esc(t('th_car'))}<\u002Fth><th style=\"width:70px\">${esc(t('th_class'))}<\u002Fth><th style=\"width:80px\">${esc(t('th_pi'))}<\u002Fth><th style=\"text-align:right\">${esc(t('th_time'))}<\u002Fth>`+\n      `<\u002Ftr><\u002Fthead><tbody>${body}<\u002Ftbody><\u002Ftable><\u002Fdiv>`;\n  }).join(\"\");\n  $(\"o-groups\").innerHTML = html || `<div class=\"empty\">${esc(t('overall_none'))}<\u002Fdiv>`;\n}\n\nfunction renderCars(s){\n  const cars = s.by_car || [];\n  const openSet = new Set([...document.querySelectorAll(\"details.veh[open]\")].map(d=>d.dataset.veh));\n  const html = cars.map((c,ci)=>{\n    const pc = clsColor(c.class);\n    const laps = (c.laps||[]).slice().sort((a,b)=>parseTime(a.time)-parseTime(b.time));\n    const key = c.name+\"|\"+ci;\n    const cslug = carSlug(c.name);\n    const open = openSet.has(key) || (openSet.size===0 && ci===0);\n    const body = laps.map((l,i)=>{\n      const tele = !!(l.has_telemetry && l.lap_id);\n      const attrs = tele\n        ? ` data-lapid=\"${esc(l.lap_id)}\" data-laptime=\"${esc(l.time)}\" data-laptrack=\"${esc(l.track)}\" data-lapcar=\"${esc(c.name)}\" tabindex=\"0\" role=\"button\" aria-label=\"${esc(tp('analyze_aria',{track:l.track,time:l.time}))}\"`\n        : \"\";\n      return `<tr class=\"${i===0?'fastest':''}${tele?' lt-click':''}\"${attrs}>`+\n        `<td class=\"lt-track\">${esc(l.track)}<\u002Ftd>`+\n        `<td class=\"lt-time\">${esc(l.time)}<\u002Ftd>`+\n        `<td class=\"lt-date\">${esc(fmtStamp(l.timestamp))}<\u002Ftd>`+\n        `<td class=\"lt-go\">${tele?('<span class=\"go\">'+esc(t('analyze'))+'&nbsp;&rsaquo;<\u002Fspan>'):''}<\u002Ftd>`+\n        `<td class=\"lt-del-cell\"><button class=\"lt-del\" data-lapid=\"${esc(l.lap_id||'')}\" title=\"${esc(t('del_lap'))}\" aria-label=\"${esc(t('del_lap'))}\">${TRASH_SVG}<\u002Fbutton><\u002Ftd>`+\n      `<\u002Ftr>`;\n    }).join(\"\");\n    return `<details class=\"veh\" data-veh=\"${esc(key)}\"${open?\" open\":\"\"}>`+\n      `<summary>`+\n        `<span class=\"chev\"><\u002Fspan>`+\n        `<span class=\"vimg\" data-slug=\"${esc(cslug)}\" data-img=\"${esc(c.image||'')}\" title=\"${esc(t('img_title_short'))}\"><\u002Fspan>`+\n        `<span class=\"vname\"><span class=\"vn\">${esc(c.name)}<\u002Fspan><span class=\"vsub\"><span class=\"cls-sm\" style=\"color:${pc};border-color:${pc}\">${esc(c.class||\"–\")}<\u002Fspan> · PI ${esc(c.pi!=null?c.pi:\"–\")}${c.ordinal?(' · #'+esc(c.ordinal)):''}<\u002Fspan><\u002Fspan>`+\n        `<span class=\"vstat\">`+\n          `<span class=\"vs\"><span class=\"k\">${esc(t('veh_laps'))}<\u002Fspan><span class=\"v\">${esc(c.lap_count!=null?c.lap_count:laps.length)}<\u002Fspan><\u002Fspan>`+\n          `<span class=\"vs\"><span class=\"k\">${esc(t('veh_best'))}<\u002Fspan><span class=\"v best mono\">${esc(c.best||\"—\")}<\u002Fspan><\u002Fspan>`+\n        `<\u002Fspan>`+\n      `<\u002Fsummary>`+\n      `<div class=\"vehbody\"><table class=\"lt\"><thead><tr>`+\n        `<th>${esc(t('th_track'))}<\u002Fth><th style=\"text-align:right\">${esc(t('th_time'))}<\u002Fth><th style=\"text-align:right\">${esc(t('th_date'))}<\u002Fth><th style=\"width:96px\"><\u002Fth><th style=\"width:48px\"><\u002Fth>`+\n      `<\u002Ftr><\u002Fthead><tbody>${body}<\u002Ftbody><\u002Ftable><\u002Fdiv>`+\n    `<\u002Fdetails>`;\n  }).join(\"\");\n  $(\"v-list\").innerHTML = html || `<div class=\"empty\">${esc(t('cars_none_data'))}<\u002Fdiv>`;\n  $(\"v-list\").querySelectorAll(\".vimg\").forEach(el=>{\n    paintCarImage(el, el.dataset.slug, el.dataset.img||null);\n    wireDrop(el, ()=>el.dataset.slug);\n  });\n}\n\n/* ---- clock + delta (smooth tick via rAF) ---- */\nconst DELTA_CAP = 3.0; // seconds mapped to full half-bar\nfunction liveLapSeconds(){\n  if(!state || !state.in_world) return null;\n  const base = state.current_lap_seconds || 0;\n  return base + (performance.now() - state._t)/1000;\n}\nfunction fmtDeltaLive(str){\n  if(str==null) return \"—\";\n  let s = String(str).trim();\n  if(lang===\"de\") s = s.replace(/\\./g, \",\");   // deutsches Dezimalkomma\n  return s + \" s\";\n}\nfunction tickClock(){\n  const clk = $(\"s-clock\"), dv = $(\"s-delta\"), fill = $(\"s-deltafill\");\n  const row = $(\"s-deltarow\"), lbl = $(\"s-clocklabel\");\n\n  // Uhr läuft nur, wenn current_lap gesetzt ist\n  const counting = !!state && state.current_lap != null;\n\n  if(!counting){\n    clk.classList.remove(\"flash\");\n    row.style.display = \"none\";\n    lbl.style.visibility = \"hidden\";\n    if(state && state.in_world && state.current_track){\n      clk.classList.remove(\"idle\",\"mono\"); clk.classList.add(\"msg\");\n      clk.textContent = t('lap_hint_start');\n    } else if(state && !state.in_world){\n      clk.classList.remove(\"idle\",\"mono\"); clk.classList.add(\"msg\");\n      clk.textContent = t('status_menu');\n    } else {\n      clk.classList.remove(\"msg\"); clk.classList.add(\"idle\",\"mono\");\n      clk.textContent = \"0:00.000\";\n    }\n    requestAnimationFrame(tickClock); return;\n  }\n\n  // Uhr läuft\n  row.style.display = \"\";\n  lbl.style.visibility = \"\";\n  clk.classList.remove(\"idle\",\"msg\"); clk.classList.add(\"mono\");\n  const live = (state.current_lap_seconds || 0) + (performance.now() - state._t)/1000;\n  clk.textContent = fmtTime(live);\n\n  // Live-Delta direkt aus state.current_delta\n  const cds = state.current_delta_seconds;\n  if(state.current_delta == null || cds == null){\n    dv.className = \"deltaval neutral mono\"; dv.textContent = \"—\";\n    fill.className = \"fill\"; fill.style.width = \"0\";\n  } else {\n    const faster = cds < 0;\n    dv.className = \"deltaval mono \" + (Math.abs(cds)<0.0005 ? \"neutral\" : (faster?\"faster\":\"slower\"));\n    dv.textContent = fmtDeltaLive(state.current_delta);\n    const p = Math.min(Math.abs(cds)/DELTA_CAP, 1), half = p*50;\n    if(faster){ fill.className=\"fill faster\"; fill.style.left=(50-half)+\"%\"; fill.style.width=half+\"%\"; }\n    else { fill.className=\"fill slower\"; fill.style.left=\"50%\"; fill.style.width=half+\"%\"; }\n  }\n  requestAnimationFrame(tickClock);\n}\n\nfunction flashBest(){\n  const clk = $(\"s-clock\"); const bc = $(\"s-bestcard\");\n  clk.classList.remove(\"flash\"); bc.classList.remove(\"flash\");\n  void clk.offsetWidth; void bc.offsetWidth;\n  clk.classList.add(\"flash\"); bc.classList.add(\"flash\");\n}\n\n/* ============================================================\n   Sample simulator (only when backend is unavailable)\n   ============================================================ */\nlet sim = null;\nlet simLapStart = 0;\nlet simLapTarget = 0;\nlet scriptedDone = false;\nconst SIM_TRACKS = [\"Coastal Sprint\",\"Desert Mile\",\"Highland Loop\",\"City Circuit\"];\nconst SIM_TARGETS = { \"Coastal Sprint\":102.3, \"Desert Mile\":58.2, \"Highland Loop\":125.4, \"City Circuit\":91.6 };\nlet simTrackIdx = 0;\nlet simIdleUntil = 0;\n\nfunction initSim(){\n  sim = JSON.parse(JSON.stringify(SAMPLE));\n  simLapStart = performance.now();\n  simIdleUntil = 0;\n  simTrackIdx = 0;\n  simLapTarget = SIM_TARGETS[SIM_TRACKS[simTrackIdx]] + (Math.random()*2-0.5);\n  // scripted new-best demo a few seconds after load (showcases blink + slide-in)\n  setTimeout(()=>{\n    if(scriptedDone || !sim) return;\n    scriptedDone = true;\n    const t = 102.090, ts = \"Coastal Sprint\";\n    const lap = { time: fmtTime(t), time_seconds: t, car_name: sim.current_car.name, class: sim.current_car.class, pi: sim.current_car.pi, track: ts };\n    sim.last_laps.unshift(lap); sim.last_laps = sim.last_laps.slice(0,7);\n    sim.session_best = { time: fmtTime(t), time_seconds: t, car_name: sim.current_car.name, track: ts };\n    const cu = sim.cars_used.find(c=>c.car_name===sim.current_car.name);\n    if(cu) cu.lap_count += 1;\n  }, 6500);\n}\nfunction simFinishLap(){\n  const track = SIM_TRACKS[simTrackIdx % SIM_TRACKS.length];\n  const tsec = simLapTarget;\n  const lap = { time: fmtTime(tsec), time_seconds: tsec, car_name: sim.current_car.name, class: sim.current_car.class, pi: sim.current_car.pi, track };\n  sim.last_laps.unshift(lap); sim.last_laps = sim.last_laps.slice(0,7);\n  if(tsec < sim.session_best.time_seconds){ sim.session_best = { time: fmtTime(tsec), time_seconds: tsec, car_name: sim.current_car.name, track }; }\n  const cu = sim.cars_used.find(c=>c.car_name===sim.current_car.name);\n  if(cu) cu.lap_count += 1;\n  simTrackIdx++;\n  simIdleUntil = performance.now() + 2600;   // kurze Pause zwischen den Runden (zeigt den Start/Ziel-Hinweis)\n  simLapStart = simIdleUntil;\n  simLapTarget = SIM_TARGETS[SIM_TRACKS[simTrackIdx % SIM_TRACKS.length]] + (Math.random()*2-0.5);\n}\nfunction simTelemetry(){\n  const t = performance.now()/1000;\n  const corner    = Math.sin(t*0.62);                       // -1..1\n  const braking   = Math.max(0, -Math.sin(t*0.5 + 0.4));    // 0..1 bursts\n  const onThrottle= Math.max(0, Math.sin(t*0.5 + 0.9));     // 0..1\n  const speed = 86 + 132*(0.5+0.5*Math.sin(t*0.45));        // ~86..218\n  const rpmMax = 8500;\n  const gear = Math.max(1, Math.min(6, Math.round(speed/36)));\n  const rpm = Math.round(2600 + (rpmMax-3200)*(0.35+0.55*Math.abs(Math.sin(t*1.35))));\n  const throttle = Math.round(100*onThrottle*(braking>0.15?0.05:1));\n  const brake = Math.round(100*braking);\n  const steer = Math.round(corner*72);\n  const lat  = +(corner*1.3).toFixed(2);\n  const long = +(onThrottle*0.85 - braking*2.1).toFixed(2);\n  const load = Math.abs(corner);\n  const baseF = 84, baseR = 89;\n  const tt = (base,extra)=> Math.round(base + extra);\n  const slip = (base,k)=> +(base + k*(load*0.45 + onThrottle*0.5)).toFixed(2);\n  return {\n    speed_kmh:+speed.toFixed(1), rpm, rpm_max:rpmMax, gear,\n    throttle, brake, steer,\n    accel_lat_g:lat, accel_long_g:long,\n    power_kw:+(120 + 210*(rpm/rpmMax)).toFixed(0), torque_nm:Math.round(360 + 120*onThrottle),\n    boost:+(0.3 + 0.9*onThrottle).toFixed(2), fuel:+(0.74 - (t%600)/4000).toFixed(2),\n    tire_temp:{ fl:tt(baseF, load*6+corner*3), fr:tt(baseF, load*6-corner*3), rl:tt(baseR, load*7+onThrottle*4+corner*2), rr:tt(baseR, load*7+onThrottle*4-corner*2) },\n    tire_slip:{ fl:slip(0.08,0.6), fr:slip(0.08,0.6), rl:slip(0.18,1.05), rr:slip(0.18,1.05) },\n    susp_travel:{ fl:+(0.4+corner*0.15).toFixed(2), fr:+(0.4-corner*0.15).toFixed(2), rl:+(0.5+long*0.05).toFixed(2), rr:+(0.5+long*0.05).toFixed(2) }\n  };\n}\nfunction simulateSample(){\n  if(!sim) initSim();\n  const now = performance.now();\n  sim.in_world = true;\n  sim.current_track = SIM_TRACKS[simTrackIdx % SIM_TRACKS.length];\n  sim.telemetry = simTelemetry();\n  if(now < simIdleUntil){\n    // zwischen den Runden – Uhr läuft nicht\n    sim.current_lap = null; sim.current_lap_seconds = 0;\n    sim.current_delta = null; sim.current_delta_seconds = null;\n    return sim;\n  }\n  const cur = (now - simLapStart)/1000;\n  if(cur >= simLapTarget){\n    simFinishLap();\n    sim.current_lap = null; sim.current_lap_seconds = 0;\n    sim.current_delta = null; sim.current_delta_seconds = null;\n    return sim;\n  }\n  const live = (now - simLapStart)/1000;\n  sim.current_lap_seconds = live;\n  sim.current_lap = fmtTime(live);\n  // Live-Delta ggü. Referenz-Bestzeit der Strecke\n  const ref = SIM_TARGETS[sim.current_track] || simLapTarget;\n  const proj = simLapTarget - ref;\n  const frac = Math.min(1, live/simLapTarget);\n  const cds = +(proj*frac + Math.sin(now/700)*0.25*(1-frac)).toFixed(3);\n  sim.current_delta_seconds = cds;\n  sim.current_delta = (cds<0?\"-\":\"+\") + Math.abs(cds).toFixed(3);\n  return sim;\n}\n\n/* ============================================================\n   Polling\n   ============================================================ */\nasync function loadState(){\n  try{\n    const res = await fetch(\"/api/state\", { cache:\"no-store\" });\n    if(!res.ok) throw new Error(\"bad status \"+res.status);\n    const data = await res.json();\n    sim = null; scriptedDone = false; // drop sim once a real backend answers\n    applyState(data);\n  }catch(e){\n    applyState(simulateSample());\n  }\n}\n\n/* ============================================================\n   UI wiring\n   ============================================================ */\ndocument.querySelectorAll(\"nav.tabs button\").forEach(btn=>{\n  btn.addEventListener(\"click\",()=>{\n    document.querySelectorAll(\"nav.tabs button\").forEach(b=>b.classList.toggle(\"active\",b===btn));\n    const t = btn.dataset.tab;\n    $(\"tab-session\").classList.toggle(\"hidden\", t!==\"session\");\n    $(\"tab-overall\").classList.toggle(\"hidden\", t!==\"overall\");\n    $(\"tab-cars\").classList.toggle(\"hidden\", t!==\"cars\");\n    $(\"tab-settings\").classList.toggle(\"hidden\", t!==\"settings\");\n  });\n});\n/* Ziffern-Stil (Kopfzeile + Einstellungen synchron) */\nfunction setFont(font){\n  document.documentElement.style.setProperty(\"--digit\", \"'\"+font+\"'\");\n  try{ localStorage.setItem(\"fh6_font\", font); }catch(e){}\n  document.querySelectorAll(\"#digitsel button, #digitsel2 button\").forEach(x=>x.classList.toggle(\"active\", x.dataset.font===font));\n}\n[\"digitsel\",\"digitsel2\"].forEach(id=>{ const el=$(id); if(el) el.addEventListener(\"click\",e=>{ const b=e.target.closest(\"button\"); if(b) setFont(b.dataset.font); }); });\n\n/* Theme / Akzentfarbe */\nconst THEMES = {\n  green:{ a:\"#2bd96b\", g:\"rgba(43,217,107,.7)\",  s:\"rgba(43,217,107,.10)\" },\n  amber:{ a:\"#f5a623\", g:\"rgba(245,166,35,.62)\", s:\"rgba(245,166,35,.12)\" },\n  blue:{  a:\"#3d9bff\", g:\"rgba(61,155,255,.62)\", s:\"rgba(61,155,255,.12)\" }\n};\nlet theme = \"green\";\ntry{ const tv=localStorage.getItem(\"fh6_theme\"); if(tv && THEMES[tv]) theme=tv; }catch(e){}\nfunction setTheme(name){\n  if(!THEMES[name]) return; theme=name;\n  const th=THEMES[name], r=document.documentElement.style;\n  r.setProperty(\"--accent\", th.a); r.setProperty(\"--accent-glow\", th.g);\n  r.setProperty(\"--accent-soft\", th.s); r.setProperty(\"--focus\", th.a);\n  try{ localStorage.setItem(\"fh6_theme\", name); }catch(e){}\n  document.querySelectorAll(\"#themesel button\").forEach(b=>b.classList.toggle(\"active\", b.dataset.theme===name));\n}\n$(\"themesel\") && $(\"themesel\").addEventListener(\"click\", e=>{ const b=e.target.closest(\"button\"); if(b) setTheme(b.dataset.theme); });\n\n/* ============================================================\n   Telemetrie-Overlay\n   ============================================================ */\nconst clamp01 = v => v<0?0:(v>1?1:v);\nconst lerp = (a,b,p)=> a+(b-a)*p;\nfunction tempHue(t){\n  // 60°C → blau (210), 85°C → grün (128), 110°C → rot (0)\n  if(t<=85) return lerp(210,128, clamp01((t-60)/25));\n  return lerp(128,0, clamp01((t-85)/25));\n}\nconst GMAX = 2.0; // g-Skala für g-g & Lenk-Mitte\nlet teleOpen = false, teleTimer = null;\n\nfunction renderTelemetry(tel){\n  const body = $(\"tele-body\"), empty = $(\"tele-empty\");\n  if(!tel){\n    body.classList.add(\"hidden\"); empty.classList.remove(\"hidden\");\n    return;\n  }\n  empty.classList.add(\"hidden\"); body.classList.remove(\"hidden\");\n\n  // Reifentemperatur je Rad (1 Nachkommastelle, Farbe nach Temp)\n  [\"fl\",\"fr\",\"rl\",\"rr\"].forEach(p=>{\n    const temp = (tel.tire_temp||{})[p];\n    const cell = $(\"t-tire-\"+p), te = $(\"t-temp-\"+p);\n    if(temp==null){ te.textContent=\"–\"; te.style.color=\"\"; cell.style.background=\"\"; }\n    else {\n      const hue = tempHue(temp);\n      te.textContent = Number(temp).toFixed(1)+\"°\";\n      te.style.color = `hsl(${hue.toFixed(0)} 78% 62%)`;\n      cell.style.background = `hsl(${hue.toFixed(0)} 70% 50% / .16)`;\n    }\n  });\n\n  // Leistung / Drehmoment\n  $(\"t-power\").textContent  = Math.round(tel.power_kw!=null?tel.power_kw:0);\n  $(\"t-torque\").textContent = Math.round(tel.torque_nm!=null?tel.torque_nm:0);\n\n  // Gas / Bremse (0–100 %)\n  $(\"t-thrfill\").style.width = clamp01((tel.throttle||0)/100)*100+\"%\";\n  $(\"t-thr\").textContent = Math.round(tel.throttle||0)+\"%\";\n  $(\"t-brkfill\").style.width = clamp01((tel.brake||0)/100)*100+\"%\";\n  $(\"t-brk\").textContent = Math.round(tel.brake||0)+\"%\";\n}\n\nfunction openTele(){\n  if(teleOpen) return; teleOpen = true;\n  const scrim = $(\"tele-scrim\");\n  scrim.hidden = false; $(\"telembtn\").classList.add(\"open\");\n  setTimeout(()=> scrim.classList.add(\"show\"), 20);\n  renderTelemetry(state ? state.telemetry : null);\n  teleTimer = setInterval(()=> renderTelemetry(state ? state.telemetry : null), 150);\n  $(\"tele-close\").focus();\n}\nfunction closeTele(){\n  if(!teleOpen) return; teleOpen = false;\n  $(\"tele-scrim\").classList.remove(\"show\"); $(\"telembtn\").classList.remove(\"open\");\n  clearInterval(teleTimer); teleTimer = null;\n  setTimeout(()=>{ if(!teleOpen) $(\"tele-scrim\").hidden = true; }, 300);\n}\n$(\"telembtn\").addEventListener(\"click\",()=> teleOpen ? closeTele() : openTele());\n$(\"tele-close\").addEventListener(\"click\", closeTele);\n$(\"tele-scrim\").addEventListener(\"click\", e=>{ if(e.target===$(\"tele-scrim\")) closeTele(); });\ndocument.addEventListener(\"keydown\", e=>{\n  const typing = /^(input|textarea|select)$/i.test(e.target.tagName);\n  if(e.key===\"Escape\" && teleOpen){ closeTele(); }\n  else if((e.key===\"t\"||e.key===\"T\") && !typing && !e.metaKey && !e.ctrlKey && !e.altKey){ teleOpen ? closeTele() : openTele(); }\n});\n\n/* ============================================================\n   Runden-Analyse (Lap Detail) — Charts in reinem SVG\n   ============================================================ */\nfunction strSeed(s){ let h=2166136261>>>0; s=String(s); for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }\nfunction mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }\nconst TRACK_LEN = { \"Desert Mile\":2400, \"Coastal Sprint\":4200, \"Highland Loop\":5200, \"City Circuit\":3600, \"Mountain Pass\":6400 };\n\n/* Fallback-Telemetrie, falls /api/lap/:id nicht erreichbar ist (Vorschau ohne Backend) */\nfunction genLapDetail(meta){\n  const rng = mulberry32(strSeed((meta.lap_id||\"\")+(meta.time||\"\")+(meta.track||\"\")));\n  const track = meta.track || \"Strecke\";\n  const L = TRACK_LEN[track] || 4000;\n  const N = 160;\n  const nc = 5 + Math.floor(rng()*4);\n  const corners = [];\n  for(let c=0;c<nc;c++) corners.push({ pos:(c+0.5)/nc + (rng()-0.5)*0.05, w:0.02+rng()*0.03, sev:0.4+rng()*0.55, dir: rng()<0.5?-1:1 });\n  const vmax = 230+rng()*42, vmin = 58+rng()*30;\n  const dist=[],speed=[],throttle=[],brake=[],gear=[],steer=[],g_lat=[],g_long=[],slip_fl=[],slip_fr=[],slip_rl=[],slip_rr=[];\n  for(let i=0;i<N;i++){\n    const f=i/(N-1); dist.push(+(f*L).toFixed(0));\n    let dip=0, st=0;\n    corners.forEach(c=>{ const e=Math.exp(-Math.pow((f-c.pos)/c.w,2)); dip=Math.max(dip,e*c.sev); st+=e*c.dir; });\n    speed.push(vmin+(vmax-vmin)*(1-Math.min(1,dip)));\n    steer.push(Math.max(-100,Math.min(100, st*85)));\n  }\n  for(let i=0;i<N;i++){\n    const dv = i>0 ? speed[i]-speed[i-1] : 0;\n    let thr=0, brk=0;\n    if(dv>0.15) thr=Math.min(100,60+dv*60);\n    else if(dv<-0.25) brk=Math.min(100,-dv*55);\n    else thr=12+Math.max(0,30-Math.abs(dv)*80);\n    throttle.push(Math.round(Math.max(0,Math.min(100,thr))));\n    brake.push(Math.round(brk));\n    gear.push(Math.max(1,Math.min(6,Math.round(speed[i]/40)+1)));\n    g_long.push(+(dv*2.2).toFixed(2));\n    g_lat.push(+((steer[i]/100)*(speed[i]/vmax)*1.55).toFixed(2));\n    const corner=Math.abs(steer[i])/100, exit=throttle[i]/100;\n    const bF=0.08+rng()*0.03, bR=0.10+rng()*0.03;\n    slip_fl.push(+(bF+corner*0.7*(0.9+0.2*rng())).toFixed(2));\n    slip_fr.push(+(bF+corner*0.7*(0.9+0.2*rng())).toFixed(2));\n    slip_rl.push(+(bR+corner*0.7+exit*0.55*corner+((corner>0.7&&exit>0.6)?0.4:0)).toFixed(2));\n    slip_rr.push(+(bR+corner*0.7+exit*0.55*corner+((corner>0.7&&exit>0.6)?0.4:0)).toFixed(2));\n  }\n  const coasting=throttle.filter((t,i)=>t<6&&brake[i]<6).length/N;\n  const fullthr =throttle.filter(t=>t>=98).length/N;\n  const griploss=slip_rl.filter((s,i)=>s>1||slip_rr[i]>1||slip_fl[i]>1||slip_fr[i]>1).length/N;\n  const zones = corners.slice().sort((a,b)=>b.sev-a.sev).slice(0,2+(rng()<0.5?1:0)).map(c=>{\n    const from=Math.max(0,Math.round((c.pos*L-180)/100)*100);\n    return { from_m:from, to_m:Math.min(L,from+200+Math.round(rng()*3)*100), lost_s:+(0.12+rng()*0.5).toFixed(2) };\n  }).sort((a,b)=>a.from_m-b.from_m);\n  const mkSug=(code,params)=>({ code, params:params||{}, text:fillTpl(I18N.de.sug[code]||code, params||{}) });\n  const overlap=throttle.filter((t,i)=>t>5&&brake[i]>5).length/N;\n  const big=zones.slice().sort((a,b)=>b.lost_s-a.lost_s)[0];\n  const issues=[];\n  if(coasting>0.12) issues.push(mkSug('coasting',{pct:Math.round(coasting*100)}));\n  if(overlap>0.03) issues.push(mkSug('overlap',{pct:Math.round(overlap*100)}));\n  if(griploss>0.04) issues.push(mkSug('high_slip',{pct:Math.round(griploss*100)}));\n  if(fullthr<0.45) issues.push(mkSug('low_full_throttle',{pct:Math.round(fullthr*100)}));\n  const suggestions=[];\n  if(big) suggestions.push(mkSug('delta_zone',{from_m:big.from_m, to_m:big.to_m, lost_s:Number(big.lost_s).toFixed(2)}));\n  if(issues.length) suggestions.push.apply(suggestions, issues); else suggestions.push(mkSug('clean'));\n  return {\n    lap:{ time:meta.time||\"—\", track, car_name:meta.car_name||\"\" },\n    channels:{ dist, speed_kmh:speed, throttle, brake, gear, steer, g_lat, g_long, slip_fl, slip_fr, slip_rl, slip_rr },\n    analysis:{\n      stats:{ coasting_pct:Math.round(coasting*100), full_throttle_pct:Math.round(fullthr*100), grip_loss_pct:Math.round(griploss*100), max_speed_kmh:Math.round(Math.max.apply(null,speed)), min_speed_kmh:Math.round(Math.min.apply(null,speed)) },\n      suggestions, delta_zones:zones, reference:t('reference_best')\n    }\n  };\n}\n\nfunction chartSVG(o){\n  const W=900, padL=46, padR=14, padT=10, padB=22, H=o.height||180;\n  const plotW=W-padL-padR, plotH=H-padT-padB;\n  const d=o.dist, d0=d[0]||0, d1=d[d.length-1]||1;\n  const yMin=o.yMin, yMax=o.yMax, span=(yMax-yMin)||1;\n  const X=v=> padL+(v-d0)/((d1-d0)||1)*plotW;\n  const Y=v=> padT+(1-(v-yMin)/span)*plotH;\n  let s='';\n  (o.bands||[]).forEach(b=>{ const x1=X(b.from_m), x2=X(b.to_m);\n    s+=`<rect x=\"${x1.toFixed(1)}\" y=\"${padT}\" width=\"${Math.max(0,x2-x1).toFixed(1)}\" height=\"${plotH}\" fill=\"rgba(255,82,71,.15)\"/>`+\n       `<line x1=\"${x1.toFixed(1)}\" y1=\"${padT}\" x2=\"${x1.toFixed(1)}\" y2=\"${(padT+plotH).toFixed(1)}\" stroke=\"rgba(255,82,71,.5)\" stroke-width=\"1\"/>`; });\n  (o.yTicks||[]).forEach(t=>{ const y=Y(t);\n    s+=`<line x1=\"${padL}\" y1=\"${y.toFixed(1)}\" x2=\"${padL+plotW}\" y2=\"${y.toFixed(1)}\" stroke=\"rgba(255,255,255,.07)\" stroke-width=\"1\"/>`+\n       `<text x=\"${padL-6}\" y=\"${(y+3.4).toFixed(1)}\" text-anchor=\"end\" font-size=\"10\" fill=\"rgba(237,239,242,.5)\" font-family=\"'JetBrains Mono',monospace\">${o.yfmt?o.yfmt(t):t}<\u002Ftext>`; });\n  if(o.threshold!=null){ const y=Y(o.threshold);\n    s+=`<line x1=\"${padL}\" y1=\"${y.toFixed(1)}\" x2=\"${padL+plotW}\" y2=\"${y.toFixed(1)}\" stroke=\"rgba(255,82,71,.9)\" stroke-width=\"1\" stroke-dasharray=\"4 3\"/>`+\n       `<text x=\"${padL+plotW}\" y=\"${(y-4).toFixed(1)}\" text-anchor=\"end\" font-size=\"9.5\" fill=\"#ff5247\" font-family=\"'JetBrains Mono',monospace\">${esc(o.thresholdLabel||'Grip-Limit 1.0')}<\u002Ftext>`; }\n  for(let k=0;k<=4;k++){ const dv=d0+(d1-d0)*k/4, x=X(dv);\n    s+=`<text x=\"${x.toFixed(1)}\" y=\"${H-6}\" text-anchor=\"${k===0?'start':(k===4?'end':'middle')}\" font-size=\"10\" fill=\"rgba(237,239,242,.5)\" font-family=\"'JetBrains Mono',monospace\">${Math.round(dv)}${k===4?' m':''}<\u002Ftext>`; }\n  s+=`<line x1=\"${padL}\" y1=\"${(padT+plotH).toFixed(1)}\" x2=\"${padL+plotW}\" y2=\"${(padT+plotH).toFixed(1)}\" stroke=\"rgba(255,255,255,.18)\" stroke-width=\"1\"/>`;\n  (o.series||[]).forEach(ser=>{\n    let p='';\n    for(let i=0;i<ser.values.length;i++){ p+=(i?'L':'M')+X(d[i]).toFixed(1)+' '+Y(ser.values[i]).toFixed(1)+' '; }\n    s+=`<path d=\"${p}\" fill=\"none\" stroke=\"${ser.color}\" stroke-width=\"${ser.width||1.8}\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>`;\n    if(o.markOver && o.threshold!=null){\n      for(let i=0;i<ser.values.length;i++){ if(ser.values[i]>o.threshold) s+=`<circle cx=\"${X(d[i]).toFixed(1)}\" cy=\"${Y(ser.values[i]).toFixed(1)}\" r=\"2.6\" fill=\"#ff5247\"/>`; }\n    }\n  });\n  return `<svg class=\"ch-svg\" viewBox=\"0 0 ${W} ${H}\" preserveAspectRatio=\"xMidYMid meet\" role=\"img\">${s}<\u002Fsvg>`;\n}\n\nfunction renderLapDetail(data){\n  currentLapData = data;\n  const lap=data.lap||{}, ch=data.channels||{}, an=data.analysis||{};\n  $(\"lap-time\").textContent = lap.time||\"—\";\n  $(\"lap-meta\").innerHTML = `<b>${esc(lap.car_name||\"\")}<\u002Fb> · ${esc(lap.track||\"\")}`+(an.reference?` · ${esc(t('lap_vs'))} ${esc(an.reference.time||an.reference)}`:\"\");\n  const dist=ch.dist||[], body=$(\"lap-body\");\n  if(!dist.length){ body.innerHTML=`<div class=\"lap-msg\">${esc(t('lap_notele'))}<\u002Fdiv>`; return; }\n\n  const st=an.stats||{};\n  const sv=(keys,suf)=>{ for(const k of keys){ if(st[k]!=null) return st[k]+(suf||\"\"); } return \"–\"; };\n  const stats=`<div class=\"lap-stats\">`+\n    `<div class=\"tile\"><div class=\"k\">${esc(t('stat_coasting'))}<\u002Fdiv><div class=\"v mono\">${sv(['coasting_pct','coasting','coast_pct'],\" %\")}<\u002Fdiv><\u002Fdiv>`+\n    `<div class=\"tile\"><div class=\"k\">${esc(t('stat_wot'))}<\u002Fdiv><div class=\"v mono\">${sv(['full_throttle_pct','full_throttle','wot_pct','throttle_pct'],\" %\")}<\u002Fdiv><\u002Fdiv>`+\n    `<div class=\"tile\"><div class=\"k\">${esc(t('stat_griploss'))}<\u002Fdiv><div class=\"v mono\">${sv(['grip_loss_pct','grip_loss','slip_pct'],\" %\")}<\u002Fdiv><\u002Fdiv>`+\n    `<div class=\"tile\"><div class=\"k\">${esc(t('stat_maxspeed'))}<\u002Fdiv><div class=\"v mono\">${sv(['max_speed_kmh','max_speed','vmax'],\" km/h\")}<\u002Fdiv><\u002Fdiv>`+\n    `<div class=\"tile\"><div class=\"k\">${esc(t('stat_minspeed'))}<\u002Fdiv><div class=\"v mono\">${sv(['min_speed_kmh','min_speed','vmin'],\" km/h\")}<\u002Fdiv><\u002Fdiv>`+\n  `<\u002Fdiv>`;\n\n  const sp=ch.speed_kmh||[];\n  const spMin=Math.floor(Math.min.apply(null,sp)/20)*20, spMax=Math.ceil(Math.max.apply(null,sp)/20)*20;\n  const zones=an.delta_zones||[];\n  const speedChart=`<div class=\"ch-block\"><div class=\"ch-title\"><span>${esc(t('ch_speed'))}<\u002Fspan><span class=\"ch-legend\"><span><i style=\"background:#edeff2\"><\u002Fi>${esc(t('leg_speed'))}<\u002Fspan>${zones.length?'<span><i style=\"background:rgba(255,82,71,.5)\"><\u002Fi>'+esc(t('leg_loss'))+'<\u002Fspan>':''}<\u002Fspan><\u002Fdiv>`+\n    chartSVG({dist,height:190,yMin:spMin,yMax:spMax,yTicks:[spMin,(spMin+spMax)/2,spMax],bands:zones,series:[{values:sp,color:'#edeff2',width:2}]})+`<\u002Fdiv>`;\n\n  let deltaList='';\n  if(zones.length) deltaList=`<div class=\"ch-block\"><div class=\"ch-title\"><span>${esc(t('sec_losszones'))}<\u002Fspan><\u002Fdiv><div class=\"dz-list\">`+\n    zones.map(z=>`<div class=\"dz-row\"><span class=\"seg\">${z.from_m}–${z.to_m} m<\u002Fspan><span class=\"lost\">+${Number(z.lost_s).toFixed(2)} s<\u002Fspan><\u002Fdiv>`).join('')+`<\u002Fdiv><\u002Fdiv>`;\n\n  const tbChart=`<div class=\"ch-block\"><div class=\"ch-title\"><span>${esc(t('ch_inputs'))}<\u002Fspan><span class=\"ch-legend\"><span><i style=\"background:#2bd96b\"><\u002Fi>${esc(t('leg_throttle'))}<\u002Fspan><span><i style=\"background:#ff5247\"><\u002Fi>${esc(t('leg_brake'))}<\u002Fspan><\u002Fspan><\u002Fdiv>`+\n    chartSVG({dist,height:150,yMin:0,yMax:100,yTicks:[0,50,100],series:[{values:ch.throttle||[],color:'#2bd96b',width:1.8},{values:ch.brake||[],color:'#ff5247',width:1.8}]})+`<\u002Fdiv>`;\n\n  const allSlip=[].concat(ch.slip_fl||[],ch.slip_fr||[],ch.slip_rl||[],ch.slip_rr||[]);\n  const slipMax=Math.max(1.2, allSlip.length?Math.max.apply(null,allSlip):1.2);\n  const slipChart=`<div class=\"ch-block\"><div class=\"ch-title\"><span>${esc(t('ch_slip'))}<\u002Fspan><span class=\"ch-legend\">`+\n    `<span><i style=\"background:#4aa3ff\"><\u002Fi>${esc(t('tire_fl'))}<\u002Fspan><span><i style=\"background:#f0a830\"><\u002Fi>${esc(t('tire_fr'))}<\u002Fspan><span><i style=\"background:#b07cff\"><\u002Fi>${esc(t('tire_rl'))}<\u002Fspan><span><i style=\"background:#edeff2\"><\u002Fi>${esc(t('tire_rr'))}<\u002Fspan><span><i style=\"background:#ff5247\"><\u002Fi>${esc(t('leg_over1'))}<\u002Fspan><\u002Fspan><\u002Fdiv>`+\n    chartSVG({dist,height:170,yMin:0,yMax:+slipMax.toFixed(1),yTicks:[0,0.5,1,+slipMax.toFixed(1)],threshold:1,thresholdLabel:t('grip_limit'),markOver:true,series:[\n      {values:ch.slip_fl||[],color:'#4aa3ff',width:1.5},{values:ch.slip_fr||[],color:'#f0a830',width:1.5},\n      {values:ch.slip_rl||[],color:'#b07cff',width:1.5},{values:ch.slip_rr||[],color:'#edeff2',width:1.5}\n    ]})+`<\u002Fdiv>`;\n\n  const sug=an.suggestions||[];\n  const sgBox=sug.length?`<div class=\"sg-box\"><div class=\"sg-head\">${esc(t('sec_suggestions'))}<\u002Fdiv><ul class=\"sg-list\">${sug.map(x=>`<li>${esc(typeof x==='string'?x:tSuggest(x))}<\u002Fli>`).join('')}<\u002Ful><\u002Fdiv>`:'';\n\n  body.innerHTML = stats + speedChart + deltaList + tbChart + slipChart + sgBox;\n}\nlet currentLapData=null;\n\nlet lapOpen=false;\nfunction openLap(id, meta){\n  lapOpen=true;\n  const sc=$(\"lap-scrim\"); sc.hidden=false; setTimeout(()=>sc.classList.add(\"show\"), 20);\n  $(\"lap-time\").textContent=\"—\";\n  $(\"lap-meta\").innerHTML=`<b>${esc(meta.car_name||\"\")}<\u002Fb> · ${esc(meta.track||\"\")}`;\n  $(\"lap-body\").innerHTML=`<div class=\"lap-msg\">${esc(t('lap_loading'))}<\u002Fdiv>`;\n  $(\"lap-close\").focus();\n  loadLap(id, meta);\n}\nasync function loadLap(id, meta){\n  let data;\n  try{\n    const r=await fetch('/api/lap/'+encodeURIComponent(id),{cache:'no-store'});\n    if(!r.ok) throw new Error(\"status \"+r.status);\n    data=await r.json();\n    if(!data || !data.channels || !data.channels.dist) throw new Error(\"kein channels\");\n  }catch(e){ data=genLapDetail(meta); }\n  if(!lapOpen) return;\n  renderLapDetail(data);\n}\nfunction closeLap(){\n  if(!lapOpen) return; lapOpen=false; currentLapData=null;\n  const sc=$(\"lap-scrim\"); sc.classList.remove(\"show\");\n  setTimeout(()=>{ if(!lapOpen){ sc.hidden=true; $(\"lap-body\").innerHTML=\"\"; } },300);\n}\n$(\"lap-close\").addEventListener(\"click\", closeLap);\n$(\"lap-scrim\").addEventListener(\"click\", e=>{ if(e.target===$(\"lap-scrim\")) closeLap(); });\ndocument.addEventListener(\"keydown\", e=>{ if(e.key===\"Escape\" && lapOpen) closeLap(); });\nfunction lapFromRow(tr){ return { lap_id:tr.dataset.lapid, time:tr.dataset.laptime, track:tr.dataset.laptrack, car_name:tr.dataset.lapcar }; }\nconst TRASH_SVG = '<svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M4 7h16\"/><path d=\"M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2\"/><path d=\"M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13\"/><path d=\"M10 11v6M14 11v6\"/><\u002Fsvg>';\nasync function deleteLap(id){\n  if(!id) return;\n  if(!confirm(t('del_confirm'))) return;\n  let done=false;\n  try{\n    const r=await fetch('/api/lap/'+encodeURIComponent(id),{method:'DELETE'});\n    if(r.ok){ const d=await r.json().catch(()=>null); if(d && d.deleted) done=true; }\n  }catch(e){}\n  if(!done){\n    // Vorschau ohne Backend: Runde lokal aus den Sample-/Sim-Daten entfernen\n    [SAMPLE, sim].forEach(src=>{ if(!src || !src.by_car) return;\n      src.by_car.forEach(c=>{ if(!c.laps) return; const before=c.laps.length;\n        c.laps=c.laps.filter(l=>l.lap_id!==id);\n        if(c.laps.length!==before && typeof c.lap_count==='number') c.lap_count=Math.max(0,c.lap_count-(before-c.laps.length));\n      });\n    });\n    lastCarsHash=\"\";   // Re-Render erzwingen, auch wenn /api/state denselben Stand liefert\n  }\n  loadState();\n}\n$(\"v-list\").addEventListener(\"click\", e=>{\n  const del=e.target.closest(\".lt-del\");\n  if(del){ e.stopPropagation(); e.preventDefault(); deleteLap(del.dataset.lapid); return; }\n  const tr=e.target.closest(\"tr.lt-click\"); if(tr) openLap(tr.dataset.lapid, lapFromRow(tr));\n});\n$(\"v-list\").addEventListener(\"keydown\", e=>{ if(e.key===\"Enter\"||e.key===\" \"){ const tr=e.target.closest(\"tr.lt-click\"); if(tr){ e.preventDefault(); openLap(tr.dataset.lapid, lapFromRow(tr)); } } });\n\n/* boot */\n$(\"langsel\").addEventListener(\"click\", e=>{ const b=e.target.closest(\"button\"); if(b) setLang(b.dataset.lang); });\ndocument.querySelectorAll(\"#langsel button\").forEach(b=>b.classList.toggle(\"active\", b.dataset.lang===lang));\nsetTheme(theme);\ntry{ const f=localStorage.getItem(\"fh6_font\"); if(f) setFont(f); }catch(e){}\napplyStaticI18n();\nwireDrop($(\"s-carimg\"), ()=>currentCarSlug);\nloadState();\nsetInterval(loadState, 400);\nrequestAnimationFrame(tickClock);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
