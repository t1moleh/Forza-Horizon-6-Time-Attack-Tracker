name: Feature request / idea
description: Suggest a feature or improvement
title: "[Idea]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Got an idea to make the tracker better? I'd love to hear it!"
  - type: textarea
    id: idea
    attributes:
      label: Your idea
      description: What would you like the tool to do?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is it useful?
      description: What problem does it solve, or how would it help you?
    validations:
      required: false
  - type: textarea
    id: how
    attributes:
      label: How could it work? (optional)
      description: Any thoughts on how it could look or behave.
    validations:
      required: false
